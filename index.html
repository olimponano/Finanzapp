// FULL DATE PICKER
function FullDatePicker({ selected, onChange, onClose }) {
  const init = selected ? new Date(selected) : new Date();
  const [mode, setMode] = useState("day");
  const [viewMonth, setViewMonth] = useState(init.getMonth());
  const [viewYear, setViewYear] = useState(init.getFullYear());

  function prevMonth() { if (viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); }
  function nextMonth() { if (viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); }

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);

  const selDate = selected ? new Date(selected) : null;
  const isSelected = (d) => selDate && selDate.getDate()===d && selDate.getMonth()===viewMonth && selDate.getFullYear()===viewYear;
  const isToday = (d) => { const t=new Date(); return t.getDate()===d && t.getMonth()===viewMonth && t.getFullYear()===viewYear; };

  const yearRange = [];
  for (let y=viewYear-10;y<=viewYear+10;y++) yearRange.push(y);

  return (
    <div style={{ position:"fixed", inset:0, zIndex:400, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.7)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:16, padding:20, width:300, boxShadow:"0 8px 32px rgba(0,0,0,0.5)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          {mode==="day" ? <button onClick={prevMonth} style={{ background:"none", border:"none", color:COLORS.textPrimary, fontSize:20, cursor:"pointer", padding:"0 8px" }}>‹</button> : <div style={{width:36}}/>}
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={() => setMode(mode==="month"?"day":"month")} style={{ background:mode==="month"?COLORS.green:COLORS.surface2, border:"none", borderRadius:6, padding:"4px 10px", color:"white", fontWeight:600, fontSize:14, cursor:"pointer" }}>{MONTHS_SHORT[viewMonth]}</button>
            <button onClick={() => setMode(mode==="year"?"day":"year")} style={{ background:mode==="year"?COLORS.green:COLORS.surface2, border:"none", borderRadius:6, padding:"4px 10px", color:"white", fontWeight:600, fontSize:14, cursor:"pointer" }}>{viewYear}</button>
          </div>
          {mode==="day" ? <button onClick={nextMonth} style={{ background:"none", border:"none", color:COLORS.textPrimary, fontSize:20, cursor:"pointer", padding:"0 8px" }}>›</button> : <div style={{width:36}}/>}
        </div>

        {mode==="day" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:6 }}>
              {DAYS_SHORT.map(d => <div key={d} style={{ textAlign:"center", fontSize:11, color:COLORS.textMuted }}>{d}</div>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {cells.map((d,i) => (
                <button key={i} onClick={() => { if(d){onChange(new Date(viewYear,viewMonth,d));onClose();} }}
                  style={{ background:d&&isSelected(d)?COLORS.green:"none", border:d&&isToday(d)&&!isSelected(d)?"1px solid "+COLORS.green:"none", borderRadius:6, padding:"6px 0", color:d?(isSelected(d)?"white":COLORS.textPrimary):"transparent", fontSize:13, cursor:d?"pointer":"default", fontWeight:d&&isSelected(d)?700:400 }}>
                  {d||""}
                </button>
              ))}
            </div>
          </div>
        )}
        {mode==="month" && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
            {MONTHS_SHORT.map((m,i) => (
              <button key={i} onClick={() => {setViewMonth(i);setMode("day");}}
                style={{ background:i===viewMonth?COLORS.green:COLORS.surface2, border:"none", borderRadius:8, padding:"10px 0", color:"white", fontSize:13, fontWeight:i===viewMonth?700:400, cursor:"pointer" }}>{m}</button>
            ))}
          </div>
        )}
        {mode==="year" && (
          <div style={{ maxHeight:220, overflowY:"auto" }}>
            {yearRange.map(y => (
              <button key={y} onClick={() => {setViewYear(y);setMode("day");}}
                style={{ width:"100%", background:y===viewYear?COLORS.green:"none", border:"none", borderRadius:8, padding:"10px 0", color:y===viewYear?"white":COLORS.textPrimary, fontSize:14, fontWeight:y===viewYear?700:400, cursor:"pointer", display:"block" }}>{y}</button>
            ))}
          </div>
        )}
        <button onClick={onClose} style={{ marginTop:16, width:"100%", background:COLORS.border, border:"none", borderRadius:8, padding:"10px 0", color:COLORS.textSecondary, cursor:"pointer", fontSize:13 }}>Cancelar</button>
      </div>
    </div>
  );
}

function DateNavigator({ selectedDate, onDateChange }) {

  const d = selectedDate || new Date();
  return (
    <div style={{ display:"flex", gap:8, marginBottom:12 }}>
      <button onClick={() => onDateChange(new Date(d.getFullYear(),d.getMonth()-1,1))} style={{ background:COLORS.surface, border:"1px solid "+COLORS.border, color:COLORS.textPrimary, width:36, height:36, borderRadius:8, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>‹</button>
      <button onClick={() => setShowCal(true)} style={{ flex:1, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:8, color:COLORS.textPrimary, fontSize:14, fontWeight:600, cursor:"pointer" }}>
        {MONTHS[d.getMonth()]} {d.getFullYear()}

      <button onClick={() => onDateChange(new Date(d.getFullYear(),d.getMonth()+1,1))} style={{ background:COLORS.surface, border:"1px solid "+COLORS.border, color:COLORS.textPrimary, width:36, height:36, borderRadius:8, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>›</button>

// CALCULATOR
function Calculator({ initialValue, onResult, onClose }) {
  const [display, setDisplay] = useState(initialValue !== "" ? String(initialValue) : "0");
  const [prev, setPrev] = useState("");
  const [op, setOp] = useState("");
  const [waitNext, setWaitNext] = useState(false);

  function pressDigit(d) {
    if (waitNext) { setDisplay(d==="."?"0.":d); setWaitNext(false); }
    else if (d==="." && display.includes(".")) return;
    else setDisplay(display==="0" ? d : display+d);
  }
  function pressOp(o) { setPrev(display); setOp(o); setWaitNext(true); }
  function pressEqual() {
    if (!op||!prev) { onResult(parseFloat(display)); onClose(); return; }
    const a=parseFloat(prev), b=parseFloat(display);
    let res=a;
    if(op==="+") res=a+b;
    if(op==="-") res=a-b;
    if(op==="*") res=a*b;
    if(op==="/") res=b!==0?a/b:a;
    onResult(Math.round(res*100)/100);
    onClose();
  }
  function pressClear() { setDisplay("0"); setPrev(""); setOp(""); setWaitNext(false); }
  function pressBack() { setDisplay(display.length>1?display.slice(0,-1):"0"); }

  const btn = (bg, color) => ({ background:bg||COLORS.surface2, border:"1px solid "+COLORS.border, borderRadius:10, fontSize:18, fontWeight:600, color:color||COLORS.textPrimary, cursor:"pointer", padding:"14px 0", display:"flex", alignItems:"center", justifyContent:"center" });

  return (
    <div style={{ position:"absolute", top:"100%", right:0, zIndex:500, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:14, padding:12, width:220, boxShadow:"0 8px 24px rgba(0,0,0,0.5)", marginTop:4 }}>
      <div style={{ background:COLORS.bg, borderRadius:8, padding:"10px 14px", marginBottom:10, textAlign:"right" }}>
        {op && <div style={{ fontSize:11, color:COLORS.textMuted, marginBottom:2 }}>{prev} {op}</div>}
        <div style={{ fontSize:26, fontFamily:"monospace", fontWeight:700, color:COLORS.textPrimary, minHeight:32 }}>{waitNext?"":display}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6 }}>
        <button onClick={pressClear} style={{...btn(COLORS.red,"white"),gridColumn:"span 2",fontSize:14}}>AC</button>
        <button onClick={pressBack}  style={btn(COLORS.surface2,COLORS.blue)}>⌫</button>
        <button onClick={()=>pressOp("/")} style={btn(COLORS.surface2,COLORS.blue)}>÷</button>
        <button onClick={()=>pressDigit("7")} style={btn()}>7</button>
        <button onClick={()=>pressDigit("8")} style={btn()}>8</button>
        <button onClick={()=>pressDigit("9")} style={btn()}>9</button>
        <button onClick={()=>pressOp("*")} style={btn(COLORS.surface2,COLORS.blue)}>×</button>
        <button onClick={()=>pressDigit("4")} style={btn()}>4</button>
        <button onClick={()=>pressDigit("5")} style={btn()}>5</button>
        <button onClick={()=>pressDigit("6")} style={btn()}>6</button>
        <button onClick={()=>pressOp("-")} style={btn(COLORS.surface2,COLORS.blue)}>−</button>
        <button onClick={()=>pressDigit("1")} style={btn()}>1</button>
        <button onClick={()=>pressDigit("2")} style={btn()}>2</button>
        <button onClick={()=>pressDigit("3")} style={btn()}>3</button>
        <button onClick={()=>pressOp("+")} style={btn(COLORS.surface2,COLORS.blue)}>+</button>
        <button onClick={()=>pressDigit("0")} style={{...btn(),gridColumn:"span 2"}}>0</button>
        <button onClick={()=>pressDigit(".")} style={btn()}>.</button>
        <button onClick={pressEqual} style={btn(COLORS.green,"white")}>=</button>
      </div>
    </div>
  );
}

        <div style={{ fontSize:13, color:COLORS.textMuted, fontWeight:600, marginBottom:14, letterSpacing:"0.06em" }}>CATEGORIA</div>
        {cats.map(cat => (
          <button key={cat.id} onClick={() => { onSelect(cat); onClose(); }}

            <span style={{ color:COLORS.textPrimary, fontSize:15 }}>{cat.label}</span>
            {selected&&selected.id===cat.id && <span style={{ marginLeft:"auto", color:COLORS.green, fontSize:18 }}>✓</span>}

        ))}
        {showNew ? (
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <input autoFocus value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nueva categoria..."
              style={{ flex:1, background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:8, padding:"10px 12px", color:COLORS.textPrimary, fontSize:14, outline:"none" }} />
            <button onClick={() => { if(newCat.trim()){onSelect({id:"custom_"+newCat,label:newCat.trim(),icon:"📦"});onClose();} }}

        ) : (
          <button onClick={() => setShowNew(true)} style={{ width:"100%", background:"none", border:"1px dashed "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textMuted, fontSize:14, cursor:"pointer", marginTop:4 }}>+ Agregar categoria</button>
        )}

    </div>
  );
}

// ACCOUNT PICKER
function AccountPicker({ accounts, selected, onSelect, onClose }) {
  const grouped = {};
  accounts.forEach(a => { if(!grouped[a.type]) grouped[a.type]=[]; grouped[a.type].push(a); });
  const typeOrder = ["efectivo","debito","billetera_virtual","credito","inversion"];
  return (
    <div style={{ position:"fixed", inset:0, zIndex:350, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:500, boxSizing:"border-box", padding:20, paddingBottom:40, maxHeight:"70vh", overflowY:"auto" }}>
        <div style={{ fontSize:13, color:COLORS.textMuted, fontWeight:600, marginBottom:14, letterSpacing:"0.06em" }}>CUENTA</div>
        {typeOrder.map(type => {
          const accs = grouped[type];
          if (!accs) return null;
          return (
            <div key={type}>
              <div style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.08em", marginBottom:6, paddingLeft:4 }}>{ACCOUNT_TYPES[type]}</div>
              {accs.map(acc => (
                <button key={acc.id} onClick={() => { onSelect(acc); onClose(); }}
                  style={{ width:"100%", background:selected&&selected.id===acc.id?COLORS.surface2:"none", border:selected&&selected.id===acc.id?"1px solid "+COLORS.green:"1px solid transparent", borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", marginBottom:6 }}>
                  <span style={{ fontSize:22 }}>{ACCOUNT_ICONS[acc.type]}</span>
                  <span style={{ color:COLORS.textPrimary, fontSize:15 }}>{acc.name}</span>
                  {selected&&selected.id===acc.id && <span style={{ marginLeft:"auto", color:COLORS.green, fontSize:18 }}>✓</span>}
                </button>
              ))}
            </div>
          );
        })}
        <button onClick={onClose} style={{ width:"100%", background:"none", border:"1px dashed "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textMuted, fontSize:14, cursor:"pointer", marginTop:4 }}>+ Agregar cuenta</button>
      </div>
    </div>
  );
}

// FORM MOVIMIENTO
function FormMovimiento({ tipo, existing, onClose, onSave, onDelete, accounts }) {
  const now = new Date();
  const initDate = existing ? new Date(existing.date) : now;
  const initTimeParts = existing && existing.time ? existing.time.split(":") : [pad(now.getHours()), pad(now.getMinutes())];
  const [amount, setAmount] = useState(existing
    ? (existing.cuotaGroupId
      ? String(Math.round((existing.cuotaMonto||existing.amount) * (existing.cuotaTotal||1) * 100)/100)
      : String(existing.amount))
    : "");
  const [date, setDate] = useState(initDate);
  const [hh, setHh] = useState(initTimeParts[0]||"00");
  const [mm, setMm] = useState(initTimeParts[1]||"00");
  const [category, setCategory] = useState(existing ? { id:"existing", label:existing.category, icon:existing.categoryIcon||"📦" } : null);
  const [account, setAccount] = useState(existing ? accounts.find(a=>a.id===existing.accountId)||null : null);
  const [accountDest, setAccountDest] = useState(existing ? accounts.find(a=>a.id===existing.accountDestId)||null : null);
  const [description, setDescription] = useState(existing ? (existing.description||"") : "");
  const [files, setFiles] = useState([]);
  const [showCal, setShowCal] = useState(false);
  const [showCatPicker, setShowCatPicker] = useState(false);
  const [showAccPicker, setShowAccPicker] = useState(false);
  const [showAccDestPicker, setShowAccDestPicker] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [confirmAction, setConfirmAction] = useState(null);
  const [esCuotas, setEsCuotas] = useState(existing ? !!existing.cuotaGroupId : false);
  const [cuotaCant, setCuotaCant] = useState(existing ? String(existing.cuotaTotal||"") : "");
  const [cuotaMonto, setCuotaMonto] = useState(existing ? String(existing.cuotaMonto||existing.amount||"") : "");

  const isTransferencia = tipo==="transferencia";
  const isGasto = tipo==="gasto";
  const accentColor = isTransferencia ? COLORS.blue : isGasto ? COLORS.red : COLORS.green;
  const icon = isTransferencia ? "⇄" : isGasto ? "↑" : "↓";
  const title = existing
    ? (isTransferencia ? "Editar transferencia" : isGasto ? "Editar gasto" : "Editar ingreso")
    : (isTransferencia ? "Nueva transferencia" : isGasto ? "Nuevo gasto" : "Nuevo ingreso");
  const dateLabel = date ? date.getDate()+" de "+MONTHS_SHORT[date.getMonth()]+" "+date.getFullYear() : "Elegir fecha";

  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function handleSave() {
    const baseDate = date ? new Date(date) : new Date(now);
    const cuotaGroupId = existing ? (existing.cuotaGroupId || existing.id) : Date.now();
    const n = esCuotas ? Math.max(1, parseInt(cuotaCant)||1) : 1;
    const montoUnitario = esCuotas ? (parseFloat(cuotaMonto)||0) : (parseFloat(amount)||0);
    // If editing a cuota, use its cuotaNum as reference (0-indexed offset)
    const refNum = (existing && existing.cuotaNum) ? existing.cuotaNum - 1 : 0;

    const movs = [];
    for (let i = 0; i < n; i++) {
      const monthOffset = i - refNum;
      const cuotaDate = new Date(baseDate.getFullYear(), baseDate.getMonth() + monthOffset, baseDate.getDate());
      const isPast = cuotaDate <= new Date();
      movs.push({
        id: Date.now() + i + Math.random(),
        tipo,
        amount: montoUnitario,
        date: cuotaDate.toISOString(),
        time: hh+":"+mm,
        accountId: account ? account.id : null,
        account: account ? account.name : "Sin cuenta",
        accountDestId: isTransferencia ? (accountDest ? accountDest.id : null) : null,
        accountDest: isTransferencia ? (accountDest ? accountDest.name : "Sin cuenta") : null,
        category: isTransferencia ? "Transferencia" : (category ? category.label : "Sin categoria"),
        categoryIcon: isTransferencia ? "" : (category ? category.icon : "📦"),
        description,
        cuotaGroupId: esCuotas ? cuotaGroupId : null,
        cuotaNum: esCuotas ? i+1 : null,
        cuotaTotal: esCuotas ? n : null,
        cuotaMonto: esCuotas ? montoUnitario : null,
        debitada: esCuotas ? isPast : true,
        isEdit: false,
        prevAccountId: null,
        prevAccountDestId: null,
        prevAmount: 0,
        prevTipo: tipo,
      });
    }

    if (existing) {
      const groupId = existing.cuotaGroupId || existing.id;
      onSave({ type:"cuotaEdit", groupId, movs });
    } else {
      onSave(movs);
    }
    onClose();
  }

  function handleConfirmAction() {
    if (confirmAction==="delete") { onDelete(existing.id); onClose(); }
    if (confirmAction==="save") handleSave();
    setConfirmAction(null);
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />

                style={{ ...fieldStyle, fontSize:16, fontFamily:"monospace", fontWeight:700, color:accentColor, flex:1 }} />
              <button onClick={() => setShowCalc(v=>!v)}
                style={{ background:COLORS.surface2, border:"1px solid "+COLORS.border, borderRadius:10, width:44, height:44, flexShrink:0, cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>🧮</button>
              {showCalc && <Calculator initialValue={amount} onResult={(v) => { setAmount(String(v)); if(esCuotas && cuotaCant) setCuotaMonto(String(Math.round(parseFloat(v||0)/parseInt(cuotaCant||1)*100)/100)); }} onClose={()=>setShowCalc(false)} />}
            </div>
          </div>

                <button onClick={() => setEsCuotas(v=>!v)}
                  style={{ background: esCuotas ? COLORS.green : COLORS.surface2, border:"1px solid "+(esCuotas?COLORS.green:COLORS.border), borderRadius:20, padding:"4px 14px", color:"white", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                  {esCuotas ? "Sí" : "No"}
                </button>
              </div>
              {esCuotas && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  <div>
                    <label style={{ ...labelStyle, fontSize:11 }}>NRO DE CUOTAS</label>
                    <input value={cuotaCant} onChange={e => { const n=e.target.value; setCuotaCant(n); if(n && amount) setCuotaMonto(String(Math.round(parseFloat(amount||0)/parseInt(n||1)*100)/100)); else if(n && cuotaMonto) setAmount(String(Math.round(parseFloat(cuotaMonto||0)*parseInt(n||1)*100)/100)); }} placeholder="ej: 3" type="number"
                      style={{ ...fieldStyle, textAlign:"center", fontFamily:"monospace" }} />
                  </div>
                  <div>
                    <label style={{ ...labelStyle, fontSize:11 }}>VALOR CUOTA</label>
                    <input value={cuotaMonto} onChange={e => { const m=e.target.value; setCuotaMonto(m); if(m && cuotaCant) setAmount(String(Math.round(parseFloat(m||0)*parseInt(cuotaCant||1)*100)/100)); else if(m && amount) setCuotaCant(String(Math.round(parseFloat(amount||0)/parseFloat(m||1)))); }} placeholder="$0" type="number"
                      style={{ ...fieldStyle, textAlign:"center", fontFamily:"monospace" }} />
                  </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>

              <label style={labelStyle}>FECHA</label>

                <span style={{ color:COLORS.textSecondary, fontSize:18, fontWeight:700, flexShrink:0 }}>:</span>

              <span style={{ marginLeft:"auto", color:COLORS.textMuted, fontSize:12 }}>›</span>
            </button>
          </div>

          {isTransferencia ? (
            <div style={{ marginBottom:14 }}>
              <label style={labelStyle}>A</label>
              <button onClick={() => setShowAccDestPicker(true)} style={{ ...fieldStyle, textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
                {accountDest ? <span>{ACCOUNT_ICONS[accountDest.type]} {accountDest.name}</span> : <span style={{ color:COLORS.textMuted }}>Seleccionar cuenta destino</span>}
                <span style={{ marginLeft:"auto", color:COLORS.textMuted, fontSize:12 }}>›</span>
              </button>
            </div>
          ) : (
            <div style={{ marginBottom:14 }}>
              <label style={labelStyle}>CATEGORIA</label>

                {category ? <span>{category.icon} {category.label}</span> : <span style={{ color:COLORS.textMuted }}>Seleccionar categoria</span>}

              </button>

          )}

          <div style={{ marginBottom:14 }}>
            <label style={labelStyle}>DESCRIPCION</label>
            <textarea value={description} onChange={e=>setDescription(e.target.value)} placeholder="Descripcion opcional..." rows={3}
              style={{ ...fieldStyle, resize:"none", fontFamily:"inherit" }} />
          </div>

          <div style={{ marginBottom:14 }}>
            <label style={labelStyle}>ARCHIVOS / FOTOS</label>
            <button onClick={() => { const i=document.createElement("input");i.type="file";i.multiple=true;i.accept="image/*,.pdf";i.onchange=e=>{const arr=Array.from(e.target.files).map(f=>({name:f.name,type:f.type}));setFiles(p=>[...p,...arr]);};i.click(); }}
              style={{ width:"100%", background:"none", border:"1px dashed "+COLORS.border, borderRadius:10, padding:"14px", color:COLORS.textMuted, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <span style={{ fontSize:20 }}>📎</span> Adjuntar archivo o foto

            {files.length>0 && (
              <div style={{ marginTop:8, display:"flex", flexWrap:"wrap", gap:8 }}>
                {files.map((f,i) => (
                  <div key={i} style={{ background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:8, padding:"6px 10px", fontSize:12, color:COLORS.textSecondary, display:"flex", alignItems:"center", gap:6 }}>
                    {f.type.startsWith("image/")?"🖼":"📄"} {f.name}
                    <button onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))} style={{ background:"none", border:"none", color:COLORS.textMuted, cursor:"pointer", fontSize:14 }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {existing && (
            <div style={{ display:"flex", gap:10, marginBottom:14 }}>
              <button onClick={() => setConfirmAction("save")} style={{ flex:1, background:COLORS.blue, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:15, fontWeight:700, cursor:"pointer" }}>Editar</button>
              <button onClick={() => setConfirmAction("delete")} style={{ flex:1, background:COLORS.red, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:15, fontWeight:700, cursor:"pointer" }}>Eliminar</button>
            </div>

          {!existing && (
            <button onClick={handleSave} style={{ width:"100%", background:accentColor, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:16, fontWeight:700, cursor:"pointer" }}>

      {showCal && <FullDatePicker selected={date} onChange={(d)=>{setDate(d);setShowCal(false);}} onClose={()=>setShowCal(false)} />}

      {showAccDestPicker && <AccountPicker accounts={accounts} selected={accountDest} onSelect={setAccountDest} onClose={()=>setShowAccDestPicker(false)} />}
      {confirmAction && (
        <ConfirmDialog

    </div>
  );

// CREDIT CARD HELPERS
function getResumenKey(fecha, cierreDia) {
  const d = new Date(fecha);
  const day = d.getDate();
  // If day > cierre, falls into next month's resumen
  if (day > cierreDia) {
    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    return next.getFullYear() + "-" + String(next.getMonth()+1).padStart(2,"0");
  }
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function getVencimientoDate(resumenKey, vencimientoDia) {
  const [y, m] = resumenKey.split("-").map(Number);
  return new Date(y, m, vencimientoDia); // month after resumen
}

// MOVEMENT ITEM
function MovimientoItem({ mov, onTap, accounts, viewFromAccountId }) {
  const isGasto = mov.tipo==="gasto";

  const isPagoTarjeta = mov.tipo==="pagoTarjeta";
  const acc = accounts ? accounts.find(a=>a.id===mov.accountId) : null;
  const isTarjeta = acc && acc.type==="credito" && isGasto;
  // When viewing a pagoTarjeta from the card account itself, it's money coming IN (reduces debt)
  const pagoVistoDesdeCard = isPagoTarjeta && viewFromAccountId != null && mov.cardId === viewFromAccountId;
  const bgColor = isPagoTarjeta ? (pagoVistoDesdeCard ? COLORS.green : COLORS.red) : isTransferencia ? COLORS.blue : isGasto ? (isTarjeta ? "#444" : COLORS.red) : COLORS.green;
  const amountColor = isPagoTarjeta ? (pagoVistoDesdeCard ? COLORS.green : COLORS.redSoft) : isTransferencia ? COLORS.blue : isGasto ? (isTarjeta ? "#aaa" : COLORS.redSoft) : COLORS.green;
  return (
    <div onClick={() => onTap(mov)} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"14px 0", borderBottom:"1px solid "+COLORS.border, cursor:"pointer" }}>
      <div style={{ width:42, height:42, borderRadius:"50%", background:bgColor, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0, marginTop:2 }}>

      </div>
      <div style={{ flex:1, minWidth:0 }}>
        {isPagoTarjeta ? (
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:3 }}>
            <span style={{ color:COLORS.textPrimary, fontWeight:600, fontSize:14 }}>Pago {mov.cardName||"Tarjeta"}</span>
            <span style={{ color:COLORS.textSecondary, fontSize:12 }}>{mov.account||""}</span>
          </div>
        ) : isTransferencia ? (
          <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:3, flexWrap:"wrap" }}>

        ) : (
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:3 }}>
            <span style={{ color:isTarjeta ? "#ccc" : COLORS.textPrimary, fontWeight:600, fontSize:14 }}>{mov.category}</span>
            <span style={{ color:COLORS.textSecondary, fontSize:12 }}>{mov.account||"Sin cuenta"}</span>
          </div>
        )}
        <div style={{ color:COLORS.textSecondary, fontSize:12, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          {mov.time||""}
          {mov.description ? " · "+mov.description : ""}

      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", flexShrink:0, marginTop:2 }}>
        <div style={{ color:amountColor, fontFamily:"monospace", fontWeight:700, fontSize:15 }}>
          {isPagoTarjeta ? (pagoVistoDesdeCard ? "+" : "-") : isTransferencia ? "" : (isGasto ? "-" : "+")}{fmt(mov.amount)}
        </div>
        {mov.cuotaNum ? <div style={{ color:COLORS.textMuted, fontSize:11, marginTop:2 }}>Cuota {mov.cuotaNum}/{mov.cuotaTotal}</div> : null}
      </div>
    </div>

// PAGO TARJETA DETAIL + EDIT
function PagoTarjetaDetail({ mov, movimientos, accounts, onClose, onSave, onDelete }) {
  const items = mov.items || (mov.itemIds ? mov.itemIds.map(id => movimientos.find(m=>m.id===id)).filter(Boolean) : []);
  const totalResumen = mov.totalResumen || items.reduce((s,m)=>s+m.amount,0);
  const [editing, setEditing] = useState(false);
  const [selectedItem, setSelectedItem] = useState(null);
  const [monto, setMonto] = useState(String(mov.amount - (mov.impuestos||[]).reduce((s,i)=>s+i.monto,0)));
  const [account, setAccount] = useState(accounts.find(a=>a.id===mov.accountId)||null);
  const [impuestos, setImpuestos] = useState(mov.impuestos||[]);
  const [newImpNombre, setNewImpNombre] = useState("");
  const [newImpMonto, setNewImpMonto] = useState("");
  const [autoDebito, setAutoDebito] = useState(!!mov.autoDebito);
  const [showAccPicker, setShowAccPicker] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [confirmEdit, setConfirmEdit] = useState(false);
  const totalImp = impuestos.reduce((s,i)=>s+i.monto,0);
  const montoBaseEditado = parseFloat(monto)||0;
  const otrosPagosPreview = movimientos.filter(m => m.tipo==="pagoTarjeta" && m.cardId===mov.cardId && m.resumenKey===mov.resumenKey && m.id!==mov.id);
  const otrosAcumuladoPreview = otrosPagosPreview.reduce((s,p) => {
    const base = p.montoBase != null ? p.montoBase : (p.amount - (p.impuestos||[]).reduce((s2,i)=>s2+i.monto,0));
    return s + base;
  }, 0);
  const acumuladoPreview = otrosAcumuladoPreview + montoBaseEditado;
  const esParcialPreview = acumuladoPreview < totalResumen;

  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function addImpuesto() {
    if (!newImpNombre.trim()||!newImpMonto) return;
    setImpuestos(p=>[...p,{nombre:newImpNombre.trim(),monto:parseFloat(newImpMonto)||0}]);
    setNewImpNombre(""); setNewImpMonto("");
  }

  function handleSave() {
    const montoBase = parseFloat(monto)||0;
    const montoTotal = montoBase + totalImp;
    // Recalculate exceso against total resumen, accounting for OTHER payments on same resumen
    const otrosPagos = movimientos.filter(m => m.tipo==="pagoTarjeta" && m.cardId===mov.cardId && m.resumenKey===mov.resumenKey && m.id!==mov.id);
    const otrosAcumulado = otrosPagos.reduce((s,p) => {
      const base = p.montoBase != null ? p.montoBase : (p.amount - (p.impuestos||[]).reduce((s2,i)=>s2+i.monto,0));
      return s + base;
    }, 0);
    const acumuladoTotal = otrosAcumulado + montoBase;
    const nuevoExceso = Math.max(0, acumuladoTotal - totalResumen);
    const nuevoEsParcial = acumuladoTotal < totalResumen;
    onSave({
      ...mov,
      amount: montoTotal,
      accountId: account ? account.id : null,
      account: account ? account.name : "Sin cuenta",
      impuestos, autoDebito,
      esParcial: nuevoEsParcial,
      montoBase,
      exceso: nuevoExceso,
      prevAccountId: mov.accountId,
      prevAmount: mov.amount,
      prevExceso: mov.exceso||0,
    });
    onClose();
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:500, boxSizing:"border-box", maxHeight:"90vh", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, padding:"20px 20px 16px" }}>
          <div style={{ width:40, height:40, borderRadius:"50%", background:COLORS.red, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:"white", flexShrink:0 }}>💳</div>
          <div style={{ flex:1 }}>
            <div style={{ color:COLORS.textPrimary, fontSize:16, fontWeight:700 }}>Pago {mov.cardName||"Tarjeta"}</div>
            <div style={{ color:COLORS.textSecondary, fontSize:12 }}>{mov.account||""} · {mov.esParcial ? "Pago parcial" : "Pago total"}</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:COLORS.textSecondary, fontSize:22, cursor:"pointer" }}>×</button>
        </div>

        <div style={{ overflowY:"auto", padding:"0 20px 24px", flex:1 }}>
          {/* Amounts summary - Total resumen → Pagado → Restante */}
          <div style={{ background:COLORS.bg, borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ color:COLORS.textSecondary, fontSize:13 }}>Total resumen</span>
              <span style={{ color:COLORS.textPrimary, fontFamily:"monospace", fontWeight:700, fontSize:14 }}>{fmt(totalResumen)}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom: mov.esParcial ? 6 : 0 }}>
              <span style={{ color:COLORS.textSecondary, fontSize:13 }}>Pagado</span>
              <span style={{ color:COLORS.redSoft, fontFamily:"monospace", fontWeight:700, fontSize:14 }}>-{fmt(mov.amount)}</span>
            </div>
            {mov.esParcial && (
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom: (mov.impuestos && mov.impuestos.length>0) ? 6 : 0 }}>
                <span style={{ color:"#f39c12", fontSize:13, fontWeight:600 }}>Restante</span>
                <span style={{ color:"#f39c12", fontFamily:"monospace", fontWeight:700, fontSize:14 }}>{fmt(totalResumen - mov.amount)}</span>

                <span style={{ color:COLORS.textSecondary, fontSize:13 }}>Impuestos</span>
                <span style={{ color:COLORS.textPrimary, fontFamily:"monospace", fontWeight:700, fontSize:14 }}>{fmt(mov.impuestos.reduce((s,i)=>s+i.monto,0))}</span>

            {mov.impuestos && mov.impuestos.map((imp,i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                <span style={{ color:COLORS.textMuted, fontSize:12 }}>{imp.nombre}</span>
                <span style={{ color:COLORS.textMuted, fontFamily:"monospace", fontSize:12 }}>{fmt(imp.monto)}</span>
              </div>
            ))}
          </div>

          {/* Items - same style as MovimientoItem, tappable for readonly detail */}
          <div style={{ fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:8 }}>GASTOS INCLUIDOS</div>
          <div style={{ background:COLORS.bg, borderRadius:10, overflow:"hidden", marginBottom:14 }}>
            {items.length===0 ? (
              <div style={{ padding:"16px 14px", color:COLORS.textMuted, fontSize:13 }}>Sin detalle disponible</div>
            ) : items.map((item,i) => {
              const d = new Date(item.date);
              const dateStr = d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear()+" "+item.time;
              return (
                <div key={item.id||i} onClick={() => setSelectedItem(item)} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"12px 14px", borderBottom:i<items.length-1?"1px solid "+COLORS.border:"none", cursor:"pointer" }}>
                  <div style={{ width:38, height:38, borderRadius:"50%", background:"#444", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0, marginTop:2 }}>
                    {item.categoryIcon||"📦"}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:2 }}>
                      <span style={{ color:"#ccc", fontWeight:600, fontSize:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:160 }}>{item.category}</span>
                      <span style={{ color:COLORS.textSecondary, fontSize:12, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{item.account||""}</span>
                    </div>
                    <div style={{ color:COLORS.textSecondary, fontSize:12, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {dateStr}{item.description ? " · "+item.description : ""}

                  </div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", flexShrink:0, marginTop:2 }}>
                    <div style={{ color:"#aaa", fontFamily:"monospace", fontWeight:700, fontSize:14 }}>-{fmt(item.amount)}</div>
                    {item.cuotaNum && <div style={{ color:COLORS.textMuted, fontSize:11 }}>Cuota {item.cuotaNum}/{item.cuotaTotal}</div>}
                  </div>
                </div>
              );
            })}
          </div>

          {editing && (
            <div>
              <div style={{ marginBottom:14 }}>
                <label style={labelStyle}>MONTO PAGADO</label>
                <input value={monto} onChange={e=>setMonto(e.target.value)} type="number"
                  style={{ ...fieldStyle, fontFamily:"monospace", fontWeight:700, fontSize:16, color:COLORS.red }} />
                {esParcialPreview && <div style={{ fontSize:11, color:"#f39c12", marginTop:4 }}>Pago parcial · Total resumen: {fmt(totalResumen)}</div>}
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={labelStyle}>CUENTA</label>
                <button onClick={()=>setShowAccPicker(true)} style={{ ...fieldStyle, textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>

                  <span style={{ marginLeft:"auto", color:COLORS.textMuted }}>›</span>
                </button>
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={labelStyle}>IMPUESTOS</label>
                {impuestos.map((imp,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px", background:COLORS.bg, borderRadius:8, marginBottom:6 }}>
                    <span style={{ color:COLORS.textPrimary, fontSize:13 }}>{imp.nombre}</span>
                    <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                      <span style={{ color:COLORS.textSecondary, fontFamily:"monospace", fontSize:13 }}>{fmt(imp.monto)}</span>
                      <button onClick={()=>setImpuestos(p=>p.filter((_,j)=>j!==i))} style={{ background:"none", border:"none", color:COLORS.textMuted, cursor:"pointer", fontSize:16 }}>×</button>

                ))}
                <div style={{ display:"flex", gap:8 }}>
                  <input value={newImpNombre} onChange={e=>setNewImpNombre(e.target.value)} placeholder="Nombre" style={{ ...fieldStyle, flex:2, fontSize:13, padding:"10px 12px" }} />
                  <input value={newImpMonto} onChange={e=>setNewImpMonto(e.target.value)} type="number" placeholder="$0" style={{ ...fieldStyle, flex:1, fontSize:13, padding:"10px 12px", textAlign:"center" }} />
                  <button onClick={addImpuesto} style={{ background:COLORS.green, border:"none", borderRadius:10, padding:"10px 14px", color:"white", fontWeight:700, cursor:"pointer" }}>+</button>
                </div>
                {totalImp > 0 && <div style={{ fontSize:11, color:COLORS.textMuted, marginTop:4 }}>Total impuestos: {fmt(totalImp)}</div>}
              </div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                <label style={{ ...labelStyle, marginBottom:0 }}>DÉBITO AUTOMÁTICO</label>
                <button onClick={()=>setAutoDebito(v=>!v)}
                  style={{ background:autoDebito?COLORS.green:COLORS.surface2, border:"1px solid "+(autoDebito?COLORS.green:COLORS.border), borderRadius:20, padding:"4px 14px", color:"white", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                  {autoDebito?"Sí":"No"}
                </button>
              </div>
            </div>
          )}

          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => editing ? setConfirmEdit(true) : setEditing(true)}
              style={{ flex:1, background:COLORS.blue, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:15, fontWeight:700, cursor:"pointer" }}>
              {editing ? "Guardar ("+fmt((parseFloat(monto)||0)+totalImp)+")" : "Editar"}
            </button>
            <button onClick={() => setConfirmDel(true)}
              style={{ flex:1, background:COLORS.red, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:15, fontWeight:700, cursor:"pointer" }}>
              Eliminar
            </button>
          </div>
        </div>
      </div>
      {showAccPicker && <AccountPicker accounts={accounts} selected={account} onSelect={setAccount} onClose={()=>setShowAccPicker(false)} />}
      {confirmEdit && <ConfirmDialog message="Guardar cambios en este pago?" onConfirm={handleSave} onCancel={()=>setConfirmEdit(false)} />}
      {confirmDel && <ConfirmDialog message="Eliminar este pago?" onConfirm={()=>{ onDelete(mov.id); onClose(); }} onCancel={()=>setConfirmDel(false)} />}
      {selectedItem && (
        <div style={{ position:"fixed", inset:0, zIndex:400, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
          <div onClick={()=>setSelectedItem(null)} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
          <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:500, boxSizing:"border-box", padding:20, paddingBottom:40 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
              <div style={{ width:40, height:40, borderRadius:"50%", background:"#444", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{selectedItem.categoryIcon||"📦"}</div>
              <div style={{ flex:1 }}>
                <div style={{ color:COLORS.textPrimary, fontWeight:700, fontSize:16 }}>{selectedItem.category}</div>
                <div style={{ color:COLORS.textSecondary, fontSize:12 }}>{selectedItem.account||""}</div>
              </div>
              <div style={{ color:"#aaa", fontFamily:"monospace", fontWeight:700, fontSize:18 }}>-{fmt(selectedItem.amount)}</div>
              <button onClick={()=>setSelectedItem(null)} style={{ background:"none", border:"none", color:COLORS.textSecondary, fontSize:22, cursor:"pointer" }}>×</button>
            </div>
            {[
              ["Fecha", new Date(selectedItem.date).getDate()+"/"+(new Date(selectedItem.date).getMonth()+1)+"/"+new Date(selectedItem.date).getFullYear()],
              ["Horario", selectedItem.time],
              ["Descripción", selectedItem.description],
              ["Cuota", selectedItem.cuotaNum ? selectedItem.cuotaNum+"/"+selectedItem.cuotaTotal : null],
            ].filter(([,v])=>v).map(([label,val])=>(
              <div key={label} style={{ marginBottom:10 }}>
                <div style={{ fontSize:11, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:3 }}>{label.toUpperCase()}</div>
                <div style={{ color:COLORS.textPrimary, fontSize:14 }}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// TABS
function TabMovimientos({ selectedDate, onDateChange, movimientos, onDelete, onEdit, accounts }) {
  const [search, setSearch] = useState("");
  const [detailMov, setDetailMov] = useState(null);
  const filtered = movimientos.filter(m => {
    const q = search.toLowerCase();
    if (q) return (m.description||"").toLowerCase().includes(q)||(m.category||"").toLowerCase().includes(q)||(m.account||"").toLowerCase().includes(q);
    const d = new Date(m.date);
    return d.getMonth()===selectedDate.getMonth() && d.getFullYear()===selectedDate.getFullYear();
  });
  const ingresos = filtered.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+m.amount,0);
  const gastos   = filtered.filter(m=>{
    if (m.tipo!=="gasto") return false;
    const acc = accounts.find(a=>a.id===m.accountId);
    if (acc && acc.type==="credito") return false; // exclude tarjeta gastos until resumen paid
    return true;
  }).reduce((s,m)=>s+m.amount,0);
  const balance  = ingresos-gastos;
  const byDay = {};
  filtered.forEach(m => { const d=new Date(m.date); const k=d.toDateString(); if(!byDay[k]) byDay[k]={date:d,items:[]}; byDay[k].items.push(m); });
  const dayKeys = Object.keys(byDay).sort((a,b)=>new Date(b)-new Date(a));
  return (
    <div style={{ padding:"0 16px" }}>
      <SearchBar value={search} onChange={setSearch} />
      <DateNavigator selectedDate={selectedDate} onDateChange={onDateChange} />
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
        <div style={{ background:COLORS.green, borderRadius:10, padding:"10px 12px" }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Ingresos</div>
          <div style={{ fontSize:16, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(ingresos)}</div>
        </div>
        <div style={{ background:COLORS.red, borderRadius:10, padding:"10px 12px" }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Gastos</div>
          <div style={{ fontSize:16, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(gastos)}</div>
        </div>
        <div style={{ background:"#2a2a2a", borderRadius:10, padding:"10px 12px" }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Balance</div>
          <div style={{ fontSize:16, fontWeight:700, fontFamily:"monospace", color:balance<0?COLORS.redSoft:"white" }}>{fmt(balance)}</div>
        </div>
      </div>
      {filtered.length===0 ? (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 20px", textAlign:"center" }}>
          <div style={{ fontSize:48, marginBottom:12 }}>💸</div>
          <div style={{ color:COLORS.textSecondary, fontSize:16, fontWeight:500, marginBottom:6 }}>Sin movimientos</div>
          <div style={{ color:COLORS.textMuted, fontSize:13 }}>Toca + para agregar</div>
        </div>
      ) : dayKeys.map(key => {
        const group = byDay[key];
        const d = group.date;
        const isToday = new Date().toDateString()===key;
        const dayLabel = isToday?"HOY":d.getDate()+" "+MONTHS_SHORT[d.getMonth()].toUpperCase()+" "+d.getFullYear();
        const dayTotal = group.items.reduce((s,m) => {
          if (m.tipo==="gasto") {
            const acc = accounts.find(a=>a.id===m.accountId);
            if (acc && acc.type==="credito") return s; // exclude tarjeta gastos
            return s - m.amount;
          }
          if (m.tipo==="ingreso") return s + m.amount;
          return s; // transferencia, pagoTarjeta: excluded
        }, 0);
        return (
          <div key={key} style={{ marginBottom:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0 4px", borderBottom:"1px solid "+COLORS.border }}>
              <span style={{ fontSize:12, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.05em" }}>{dayLabel}</span>
              <span style={{ fontSize:12, fontWeight:700, color:dayTotal<0?COLORS.redSoft:COLORS.green }}>{dayTotal<0?"-":"+"}{fmt(Math.abs(dayTotal))}</span>
            </div>
            {group.items.map(m => <MovimientoItem key={m.id} mov={m} onTap={setDetailMov} accounts={accounts} />)}
          </div>
        );
      })}
      {detailMov && detailMov.tipo==="pagoTarjeta" && (
        <PagoTarjetaDetail
          mov={detailMov}
          movimientos={movimientos}
          accounts={accounts}
          onClose={() => setDetailMov(null)}
          onSave={(updated) => { onEdit(updated); setDetailMov(null); }}
          onDelete={(id) => { onDelete(id); setDetailMov(null); }}
        />
      )}      {detailMov && detailMov.tipo!=="pagoTarjeta" && (
        <FormMovimiento
          tipo={detailMov.tipo}
          existing={detailMov}
          onClose={() => setDetailMov(null)}
          onSave={(mov) => { onEdit(mov); setDetailMov(null); }}
          onDelete={(id) => { onDelete(id); setDetailMov(null); }}
          accounts={accounts}
        />
      )}
    </div>
  );
}

// PAGO TARJETA FORM
function FormPagoTarjeta({ resumen, card, items, accounts, yaPagado, onClose, onSave }) {
  const total = items.reduce((s,m) => s+m.amount, 0);
  const restanteOriginal = total - (yaPagado||0);
  const [monto, setMonto] = useState(String(restanteOriginal));
  const [account, setAccount] = useState(null);
  const [showAccPicker, setShowAccPicker] = useState(false);
  const [impuestos, setImpuestos] = useState([]);
  const [newImpNombre, setNewImpNombre] = useState("");
  const [newImpMonto, setNewImpMonto] = useState("");
  const [showItems, setShowItems] = useState(false);
  const [autoDebito, setAutoDebito] = useState(!!card.autoDebito);
  const [selectedItem, setSelectedItem] = useState(null);
  const totalImp = impuestos.reduce((s,i) => s+i.monto, 0);
  const montoPagado = parseFloat(monto)||0;
  const acumuladoConEste = (yaPagado||0) + montoPagado;
  const esParcial = acumuladoConEste < total; // compare base amounts without tax
  const exceso = Math.max(0, acumuladoConEste - total);
  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function addImpuesto() {
    if (!newImpNombre.trim() || !newImpMonto) return;
    setImpuestos(p => [...p, { nombre:newImpNombre.trim(), monto:parseFloat(newImpMonto)||0 }]);
    setNewImpNombre(""); setNewImpMonto("");
  }

  function handlePagar() {
    const montoTotal = montoPagado + totalImp;
    onSave({
      id: Date.now(), tipo:"pagoTarjeta",
      amount: montoTotal,
      date: new Date().toISOString(),
      time: pad(new Date().getHours())+":"+pad(new Date().getMinutes()),
      accountId: account ? account.id : null,
      account: account ? account.name : "Sin cuenta",
      cardId: card.id, cardName: card.name,
      resumenKey: resumen,
      impuestos,
      items: items,
      esParcial,
      montoBase: montoPagado,
      exceso,
      totalResumen: total,
      autoDebito,
      debitada: true,
    });
    onClose();
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:300, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:500, boxSizing:"border-box", maxHeight:"90vh", overflowY:"auto", padding:20, paddingBottom:40 }}>
        <div style={{ display:"flex", alignItems:"center", marginBottom:16 }}>
          <div style={{ width:40, height:40, borderRadius:"50%", background:COLORS.red, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:"white", flexShrink:0 }}>💳</div>
          <div style={{ marginLeft:12, flex:1 }}>
            <div style={{ color:COLORS.textPrimary, fontSize:16, fontWeight:700 }}>Pagar {card.name}</div>
            <div style={{ color:COLORS.textSecondary, fontSize:12 }}>Resumen {resumen}</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:COLORS.textSecondary, fontSize:22, cursor:"pointer" }}>×</button>
        </div>

        {/* Items summary */}
        <button onClick={() => setShowItems(v=>!v)} style={{ width:"100%", background:COLORS.surface2, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", marginBottom: showItems ? 0 : 14, borderRadius: showItems ? "10px 10px 0 0" : 10 }}>
          <span style={{ color:COLORS.textSecondary, fontSize:13 }}>{items.length} ítems · {showItems ? "▲" : "▼"}</span>
          <span style={{ color:COLORS.green, fontFamily:"monospace", fontWeight:700 }}>{fmt(total)}</span>
        </button>
        {showItems && (
          <div style={{ background:COLORS.bg, borderRadius:"0 0 10px 10px", marginBottom:14, overflow:"hidden" }}>
            {items.map((item, i) => {
              const d = new Date(item.date);
              const dateStr = d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear()+(item.time?" "+item.time:"");
              return (
                <div key={item.id} onClick={() => setSelectedItem(item)} style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"10px 14px", borderBottom: i<items.length-1?"1px solid "+COLORS.border:"none", cursor:"pointer" }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", background:"#444", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                    {item.categoryIcon||"📦"}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:2 }}>
                      <span style={{ color:"#ccc", fontWeight:600, fontSize:13, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:130 }}>{item.category}</span>
                      <span style={{ color:COLORS.textSecondary, fontSize:11, whiteSpace:"nowrap" }}>{item.account||""}</span>
                    </div>
                    <div style={{ color:COLORS.textSecondary, fontSize:11, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {dateStr}{item.description ? " · "+item.description : ""}
                    </div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", flexShrink:0 }}>
                    <div style={{ color:"#aaa", fontFamily:"monospace", fontWeight:700, fontSize:13 }}>-{fmt(item.amount)}</div>
                    {item.cuotaNum && <div style={{ color:COLORS.textMuted, fontSize:10 }}>Cuota {item.cuotaNum}/{item.cuotaTotal}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div style={{ marginBottom:14 }}>
          <label style={labelStyle}>MONTO A PAGAR</label>
          <input value={monto} onChange={e=>setMonto(e.target.value)} type="number" style={{ ...fieldStyle, fontFamily:"monospace", fontWeight:700, fontSize:16, color:COLORS.red }} />
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
            <span style={{ fontSize:11, color:COLORS.textMuted }}>
              Total resumen: {fmt(total)}{yaPagado>0 ? " · Ya pagado: "+fmt(yaPagado) : ""}

function TabPeriodicos({ selectedDate, onDateChange, movimientos, accounts, onPagoTarjeta, onEditMov, onDeleteMov }) {

  // Group tarjeta gastos by card and resumen
  const creditCards = accounts.filter(a => a.type==="credito");
  const resumenes = [];
  creditCards.forEach(card => {
    if (!card.cierre) return;
    const today = new Date();
    const gastosTarjeta = movimientos.filter(m => m.accountId===card.id && m.tipo==="gasto" && !m.resumenPagado);
    const byResumen = {};
    gastosTarjeta.forEach(m => {
      const key = getResumenKey(m.date, card.cierre);
      if (!byResumen[key]) byResumen[key] = [];
      byResumen[key].push(m);
    });
    Object.entries(byResumen).forEach(([key, items]) => {
      // Only show resumen from its cierre date onwards
      const [ky, km] = key.split("-").map(Number);
      const cierreDate = new Date(ky, km-1, card.cierre);
      if (today < cierreDate) return; // not yet closed, don't show
      const venc = getVencimientoDate(key, card.vencimiento||20);
      const total = items.reduce((s,m) => s+m.amount, 0);
      // Sum ALL payments made for this resumen (base amount without impuestos)
      const pagosDeEsteResumen = movimientos.filter(m => m.tipo==="pagoTarjeta" && m.cardId===card.id && m.resumenKey===key);
      const yaPagadoAcumulado = pagosDeEsteResumen.reduce((s,p) => {
        const base = p.montoBase != null ? p.montoBase : (p.amount - (p.impuestos||[]).reduce((s2,i)=>s2+i.monto,0));
        return s + base;
      }, 0);
      const pagadoCompleto = yaPagadoAcumulado >= total;
      const pagadoParcial = yaPagadoAcumulado > 0 && !pagadoCompleto;
      resumenes.push({ card, resumenKey:key, items, total, vencimiento:venc, pagado:pagadoCompleto, pagadoParcial, yaPagadoAcumulado, pagos:pagosDeEsteResumen });
    });
  });
  resumenes.sort((a,b) => new Date(a.vencimiento)-new Date(b.vencimiento));

            const pagado = r.pagado;

function PieChart({ slices, size }) {
  const r = size / 2;
  const cx = r;
  const cy = r;
  const innerR = r * 0.55;
  let cumAngle = -Math.PI / 2;
  const paths = slices.map((s) => {
    const angle = s.pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const x2 = cx + r * Math.cos(cumAngle);
    const y2 = cy + r * Math.sin(cumAngle);
    const ix1 = cx + innerR * Math.cos(cumAngle - angle);
    const iy1 = cy + innerR * Math.sin(cumAngle - angle);
    const ix2 = cx + innerR * Math.cos(cumAngle);
    const iy2 = cy + innerR * Math.sin(cumAngle);
    const large = angle > Math.PI ? 1 : 0;
    const d = [
      "M", x1, y1,
      "A", r, r, 0, large, 1, x2, y2,
      "L", ix2, iy2,
      "A", innerR, innerR, 0, large, 0, ix1, iy1,
      "Z"
    ].join(" ");
    return { d, color: s.color };
  });
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {paths.map((p, i) => <path key={i} d={p.d} fill={p.color} />)}
    </svg>
  );
}

function fmtShort(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,"") + "k";
  return String(Math.round(n));
}

function VerticalBarChart({ cats, colors }) {
  const max = cats.reduce((m, c) => c.total > m ? c.total : m, 0) || 1;
  const barW = 36;
  const gap = 12;
  const LABEL_H = 38;
  const BAR_AREA_H = 200 - LABEL_H - 1;
  const totalW = cats.length * (barW + gap);

  return (
    <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column" }}>
      {/* Bars area with hidden scrollbar */}
      <div style={{ flex:1, overflowX:"auto", overflowY:"hidden", scrollbarWidth:"none", msOverflowStyle:"none" }}>
        <style>{".no-scroll::-webkit-scrollbar{display:none}"}</style>
        <div className="no-scroll" style={{ width:totalW, height:"100%", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, display:"flex", alignItems:"flex-end", gap:gap }}>
            {cats.map((cat, i) => {
              const barH = Math.max(4, Math.round((cat.total / max) * (BAR_AREA_H - 16)));
              const color = colors[i % colors.length];
              return (
                <div key={cat.label} style={{ flexShrink:0, width:barW, display:"flex", flexDirection:"column", alignItems:"center" }}>
                  <span style={{ fontSize:10, color:COLORS.textSecondary, fontFamily:"monospace", whiteSpace:"nowrap", marginBottom:3 }}>{fmtShort(cat.total)}</span>
                  <div style={{ width:barW, height:barH, background:color, borderRadius:"4px 4px 0 0" }} />
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {/* Baseline full width */}
      <div style={{ height:1, background:COLORS.border, flexShrink:0, width:"100%" }} />
      {/* Labels row with hidden scrollbar, synced width */}
      <div style={{ height:LABEL_H, overflowX:"auto", overflowY:"hidden", scrollbarWidth:"none", msOverflowStyle:"none", flexShrink:0 }}>
        <div style={{ width:totalW, display:"flex", gap:gap, paddingTop:6 }}>
          {cats.map((cat, i) => (
            <div key={cat.label} style={{ flexShrink:0, width:barW, fontSize:10, color:COLORS.textSecondary, textAlign:"center", lineHeight:1.2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {cat.icon} {cat.label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function getDateRange(selectedDate, periodo) {
  const d = new Date(selectedDate);
  const y = d.getFullYear();
  const m = d.getMonth();
  const day = d.getDate();
  if (periodo==="semana") {
    const dow = d.getDay();
    const start = new Date(y, m, day - dow);
    const end = new Date(y, m, day - dow + 6);
    return { start, end, label: start.getDate()+"/"+(start.getMonth()+1)+" - "+end.getDate()+"/"+(end.getMonth()+1)+"/"+end.getFullYear() };
  }
  if (periodo==="mensual") {
    return { start: new Date(y,m,1), end: new Date(y,m+1,0), label: ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m]+" "+y };
  }
  if (periodo==="trimestre") {
    const q = Math.floor(m/3);
    const sm = q*3;
    return { start: new Date(y,sm,1), end: new Date(y,sm+3,0), label: "T"+(q+1)+" "+y };
  }
  if (periodo==="semestre") {
    const sm = m < 6 ? 0 : 6;
    return { start: new Date(y,sm,1), end: new Date(y,sm+6,0), label: (sm===0?"1er":"2do")+" semestre "+y };
  }
  if (periodo==="anual") {
    return { start: new Date(y,0,1), end: new Date(y,11,31), label: String(y) };
  }
  return { start: new Date(y,m,1), end: new Date(y,m+1,0), label: "" };
}

function TabAnalisis({ selectedDate, onDateChange, movimientos, accounts }) {
  const [vista, setVista] = useState("gastos");

  const [periodo, setPeriodo] = useState("mensual");
  const [showPeriodo, setShowPeriodo] = useState(false);

  const range = getDateRange(selectedDate, periodo);

  function getTarjetaGastosEnPago(movs, range, accounts) {
    // Only count items from FULLY paid resumenes (not parcial) whose payment date falls in this range
    const pagos = movs.filter(m => m.tipo==="pagoTarjeta" && !m.esParcial && new Date(m.date) >= range.start && new Date(m.date) <= range.end);
    const result = [];
    pagos.forEach(pago => {
      const pagoItems = pago.items || (pago.itemIds ? pago.itemIds.map(id => movs.find(m=>m.id===id)).filter(Boolean) : []);
      pagoItems.forEach(item => result.push(item));
    });
    return result;
  }

  const allInRange = movimientos.filter(m => {
    const d = new Date(m.date);
    // Exclude tarjeta gastos (show them only when paid)
    const acc = m.accountId ? (typeof accounts !== "undefined" ? accounts : []).find(a=>a.id===m.accountId) : null;
    if (m.tipo==="gasto" && acc && acc.type==="credito") return false;
    return d >= range.start && d <= range.end;
  });

  const tarjetaGastosEnPago = getTarjetaGastosEnPago(movimientos, range, accounts||[]);
  const gastos   = [...allInRange.filter(m=>m.tipo==="gasto"), ...tarjetaGastosEnPago];

    return Object.values(map).sort((a,b) => b.total - a.total);

// FORM CUENTA (agregar o editar)
function FormCuenta({ existing, onClose, onSave, onDelete }) {
  const [name, setName] = useState(existing ? existing.name : "");
  const [type, setType] = useState(existing ? existing.type : "efectivo");
  const [cierre, setCierre] = useState(existing ? String(existing.cierre||"") : "");
  const [vencimiento, setVencimiento] = useState(existing ? String(existing.vencimiento||"") : "");
  const [autoDebito, setAutoDebito] = useState(existing ? !!existing.autoDebito : false);
  const [confirm, setConfirm] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const typeOrder = ["efectivo","debito","billetera_virtual","credito","inversion"];
  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function handleSave() {
    if (existing) { setConfirm(true); return; }
    onSave({ id: Date.now(), name:name.trim(), type, balance:0, cierre: type==="credito" ? parseInt(cierre)||1 : null, vencimiento: type==="credito" ? parseInt(vencimiento)||1 : null, autoDebito: type==="credito" ? autoDebito : false });

      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:500, boxSizing:"border-box", padding:20, paddingBottom:40, maxHeight:"90vh", overflowY:"auto" }}>
        <div style={{ display:"flex", alignItems:"center", marginBottom:20 }}>

        </div>
        <div style={{ marginBottom:14 }}>
          <label style={labelStyle}>NOMBRE</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre de la cuenta" style={fieldStyle} />
        </div>
        <div style={{ marginBottom: type==="credito" ? 14 : 20 }}>
          <label style={labelStyle}>TIPO</label>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {typeOrder.map(t => (

                style={{ background: type===t ? COLORS.surface2 : "none", border: type===t ? "1px solid "+COLORS.green : "1px solid transparent", borderRadius:10, padding:"11px 14px", display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}>
                <span style={{ fontSize:20 }}>{ACCOUNT_ICONS[t]}</span>

                {type===t && <span style={{ marginLeft:"auto", color:COLORS.green }}>✓</span>}

        </div>

          <div style={{ marginBottom:20 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <label style={labelStyle}>DIA DE CIERRE</label>

                  style={{ ...fieldStyle, textAlign:"center" }} />
              </div>
              <div>
                <label style={labelStyle}>DIA DE VENCIMIENTO</label>
                <input value={vencimiento} onChange={e=>setVencimiento(e.target.value.replace(/\D/g,""))} placeholder="ej: 20" maxLength={2} type="number"
                  style={{ ...fieldStyle, textAlign:"center" }} />
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <label style={{ ...labelStyle, marginBottom:0 }}>DÉBITO AUTOMÁTICO</label>

                {autoDebito ? "Sí" : "No"}

        </button>

          <button onClick={() => setConfirmDel(true)}
            style={{ width:"100%", background:"none", border:"1px solid "+COLORS.red, borderRadius:12, padding:"14px 0", color:COLORS.redSoft, fontSize:15, fontWeight:700, cursor:"pointer" }}>

        )}

        <ConfirmDialog
          message="Guardar los cambios en esta cuenta?"
          onConfirm={() => { onSave({ ...existing, name:name.trim(), type, cierre: type==="credito" ? parseInt(cierre)||existing.cierre : null, vencimiento: type==="credito" ? parseInt(vencimiento)||existing.vencimiento : null, autoDebito: type==="credito" ? autoDebito : false }); onClose(); }}

        <ConfirmDialog
          message="Eliminar esta cuenta? Esta accion no se puede deshacer."
          onConfirm={() => { onDelete(existing.id); onClose(); }}
          onCancel={() => setConfirmDel(false)}
        />
      )}
    </div>
  );
}

function TabCuentas({ accounts, onAddAccount, onEditAccount, onDeleteAccount, movimientos }) {
  const [selectedAcc, setSelectedAcc] = useState(null);
  const [editingAcc, setEditingAcc] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const netWorth = accounts.reduce((s,a)=>s+a.balance,0);
  const grouped = {};
  accounts.forEach(a => { if(!grouped[a.type]) grouped[a.type]=[]; grouped[a.type].push(a); });
  const typeOrder = ["efectivo","debito","billetera_virtual","credito","inversion"];

  if (selectedAcc) {
    const acc = accounts.find(a=>a.id===selectedAcc.id) || selectedAcc;
    return (
      <>
        <CuentaDetalle
          acc={acc}
          movimientos={movimientos}
          onClose={() => setSelectedAcc(null)}
          onEdit={() => setEditingAcc(acc)}
        />
        {editingAcc && (
          <FormCuenta
            existing={editingAcc}
            onClose={() => setEditingAcc(null)}

  }

  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ background:COLORS.green, borderRadius:14, padding:"18px 20px", marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between" }}>

          <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginBottom:4 }}>Patrimonio neto</div>
          <div style={{ fontSize:28, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(netWorth)}</div>
        </div>
        <button onClick={() => setShowAdd(true)}
          style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:10, padding:"8px 14px", display:"flex", alignItems:"center", gap:6, cursor:"pointer", color:"white", fontSize:13, fontWeight:600 }}>
          <span style={{ fontSize:18, lineHeight:1 }}>+</span> Agregar cuenta

        return (
          <div key={type} style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.08em", marginBottom:8, paddingLeft:4 }}>{ACCOUNT_TYPES[type]}</div>
            {accs.map(acc => (
              <div key={acc.id} onClick={() => setSelectedAcc(acc)}

                <div style={{ width:40, height:40, borderRadius:10, background:COLORS.border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{ACCOUNT_ICONS[acc.type]}</div>
                <div style={{ flex:1 }}>
                  <div style={{ color:COLORS.textPrimary, fontWeight:600, fontSize:15 }}>{acc.name}</div>
                  <div style={{ color:COLORS.textSecondary, fontSize:12, textTransform:"capitalize" }}>
                    {acc.type==="credito" && acc.balance>0 ? "Saldo a favor" : acc.type.replace("_"," ")}
