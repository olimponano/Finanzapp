<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanzApp</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;font-family:system-ui,sans-serif}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const MESES_C=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const CAT_COLORES={Alimentacion:"#E24B4A",Vivienda:"#7F77DD",Transporte:"#378ADD",Salud:"#1D9E75",Entretenimiento:"#EF9F27",Sueldo:"#1D9E75",Freelance:"#378ADD",Renta:"#7F77DD",Servicios:"#BA7517",Ropa:"#E24B4A",Educacion:"#7F77DD",Tecnologia:"#378ADD",Otros:"#B4B2A9"};
const CUENTAS=[{id:"billetera",name:"Billetera",type:"Efectivo",icon:"💵",bg:"#E1F5EE",fg:"#085041"},{id:"nacion",name:"Banco Nacion",type:"Debito",icon:"🏦",bg:"#E6F1FB",fg:"#0C447C"},{id:"mp",name:"Mercado Pago",type:"Billetera virtual",icon:"📱",bg:"#FAEEDA",fg:"#633806"},{id:"visa",name:"Visa Galicia",type:"Credito",icon:"💳",bg:"#FCEBEB",fg:"#791F1F"},{id:"fci",name:"FCI Renta Fija",type:"Inversion",icon:"📈",bg:"#EEEDFE",fg:"#3C3489"}];
const CAT_GASTO=["Alimentacion","Vivienda","Transporte","Salud","Entretenimiento","Ropa","Educacion","Tecnologia","Servicios","Otros"];
const CAT_ING=["Sueldo","Freelance","Renta","Dividendos","Otros ingresos"];
const T={bg:"#0f0f0f",card:"#1a1a1a",card2:"#242424",border:"rgba(255,255,255,0.08)",border2:"rgba(255,255,255,0.14)",tx:"#f0f0f0",tx2:"#a0a0a0",tx3:"#555",green:"#1D9E75",greenL:"#0a3d2c",greenT:"#5DCAA5",red:"#E24B4A",redL:"#3d0f0f",blue:"#378ADD",blueL:"#0c2a4a",purple:"#7F77DD",purpleL:"#1e1a3d",amber:"#EF9F27",amberL:"#3d2a0a"};
function fmt(n){return"$"+Number(n).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtFecha(iso){const[y,m,d]=iso.split("-");return`${d} ${MESES_C[parseInt(m)-1]} ${y}`}
function isHoy(iso){const t=new Date(),[y,m,d]=iso.split("-");return t.getFullYear()==y&&t.getMonth()+1==m&&t.getDate()==d}
function isAyer(iso){const t=new Date();t.setDate(t.getDate()-1);const[y,m,d]=iso.split("-");return t.getFullYear()==y&&t.getMonth()+1==m&&t.getDate()==d}
function labelDia(iso){return isHoy(iso)?"Hoy — "+fmtFecha(iso):isAyer(iso)?"Ayer — "+fmtFecha(iso):fmtFecha(iso)}
function ahora(){const n=new Date();return{fecha:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`,hora:`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`}}
function cuentaNombre(id){return CUENTAS.find(c=>c.id===id)?.name||id}
function getMov(){try{return JSON.parse(localStorage.getItem("fa_mov")||"[]")}catch{return[]}}
function saveMov(a){localStorage.setItem("fa_mov",JSON.stringify(a))}
function getPer(){try{return JSON.parse(localStorage.getItem("fa_per")||"[]")}catch{return[]}}
function savePer(a){localStorage.setItem("fa_per",JSON.stringify(a))}

function Reloj(){
  const[t,setT]=useState(()=>{const n=new Date();return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`});
  useEffect(()=>{const id=setInterval(()=>{const n=new Date();setT(`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`)},5000);return()=>clearInterval(id)},[]);
  return <span style={{fontSize:14,fontWeight:600,color:T.tx}}>{t}</span>;
}

function SummaryBar({ing,gas}){
  const bal=ing-gas;
  return(<div style={{display:"flex",gap:6,padding:"8px 16px",borderBottom:`0.5px solid ${T.border}`}}>
    {[{label:"Ingresos",val:ing,bg:T.greenL,color:T.greenT},{label:"Gastos",val:gas,bg:T.redL,color:"#f09595"},{label:"Balance",val:bal,bg:T.card2,color:bal>=0?T.greenT:"#f09595"}].map(p=>(
      <div key={p.label} style={{flex:1,padding:"6px 4px",borderRadius:8,background:p.bg,textAlign:"center"}}>
        <div style={{fontSize:10,color:T.tx3,marginBottom:1}}>{p.label}</div>
        <div style={{fontSize:11,fontWeight:500,fontFamily:"monospace",color:p.color}}>{p.label==="Balance"&&bal>=0?"+":""}{fmt(p.val)}</div>
      </div>
    ))}
  </div>);
}

function EmptyState({icon,msg}){
  return(<div style={{textAlign:"center",padding:"50px 20px",color:T.tx3}}>
    <div style={{fontSize:38,marginBottom:10,opacity:.4}}>{icon}</div>
    <p style={{fontSize:13,color:T.tx2}}>{msg}</p>
    <p style={{fontSize:11,marginTop:4,color:T.tx3}}>Tocá + para agregar</p>
  </div>);
}

function Calculadora({onResult,init="0"}){
  const[display,setDisplay]=useState(()=>init&&init!=="0"?init:"");
  const[expr,setExpr]=useState("");
  const[waitingNext,setWaitingNext]=useState(false);
  function press(val){
    if(val==="AC"){setDisplay("");setExpr("");setWaitingNext(false);return}
    if(val==="←"){if(waitingNext){setDisplay("");setWaitingNext(false);return}setDisplay(d=>d.length>1?d.slice(0,-1):"");return}
    if(val==="="){try{const r=Math.round(Function('"use strict";return('+(expr+(display||"0"))+')')() *100)/100;setDisplay(String(r));setExpr("");setWaitingNext(false);onResult(r);}catch{setDisplay("Error")}return}
    const ops=["+","-","×","÷"];
    if(ops.includes(val)){setExpr(expr+(display||"0")+(val==="×"?"*":val==="÷"?"/":val));setDisplay("");setWaitingNext(true);return}
    if(val==="."){if(!waitingNext&&display.includes("."))return;setDisplay(waitingNext||display===""?"0.":display+".");setWaitingNext(false);return}
    if(waitingNext){setDisplay(val);setWaitingNext(false);}else setDisplay(d=>d===""||d==="0"?val:d+val);
  }
  const btns=[{v:"AC",s:2},{v:"←",s:2},{v:"÷",s:1},{v:"×",s:1},{v:"7",s:0},{v:"8",s:0},{v:"9",s:0},{v:"-",s:1},{v:"4",s:0},{v:"5",s:0},{v:"6",s:0},{v:"+",s:1},{v:"1",s:0},{v:"2",s:0},{v:"3",s:0},{v:"=",s:3},{v:".",s:0},{v:"0",s:0}];
  return(<div style={{background:T.card2,borderRadius:10,padding:10,marginTop:6}}>
    <div style={{textAlign:"right",padding:"2px 6px 8px",minHeight:28}}>
      {expr&&<span style={{fontSize:11,color:T.tx3,marginRight:4}}>{expr}</span>}
      <span style={{fontSize:20,fontFamily:"monospace",color:display?T.tx:T.tx3}}>{display||"0"}</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
      {btns.map((b,i)=><button key={i} onClick={()=>press(b.v)} style={{padding:"9px 0",border:"none",borderRadius:6,cursor:"pointer",fontSize:14,fontWeight:500,background:b.s===3?T.green:b.s===1||b.s===2?"#2e2e2e":T.card,color:b.s===3?"#fff":b.s===1?T.blue:T.tx}}>{b.v}</button>)}
      <div/><div/>
    </div>
  </div>);
}

function Calendario({fecha,onConfirm,onCancel}){
  const[tmp,setTmp]=useState(new Date(fecha+"T12:00:00"));
  function navMes(d){setTmp(prev=>new Date(prev.getFullYear(),prev.getMonth()+d,1))}
  const y=tmp.getFullYear(),m=tmp.getMonth(),primerDia=(new Date(y,m,1).getDay()+6)%7,diasMes=new Date(y,m+1,0).getDate(),hoy=new Date();
  return(<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
    <div style={{background:T.card,borderRadius:12,padding:16,width:280,border:`0.5px solid ${T.border2}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>navMes(-1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:T.tx2}}>‹</button>
        <span style={{fontSize:14,fontWeight:500,color:T.tx}}>{MESES[m]} {y}</span>
        <button onClick={()=>navMes(1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:T.tx2}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {["Lu","Ma","Mi","Ju","Vi","Sá","Do"].map(d=><div key={d} style={{fontSize:10,color:T.tx3,textAlign:"center",padding:"3px 0"}}>{d}</div>)}
        {Array(primerDia).fill(null).map((_,i)=><div key={"e"+i}/>)}
        {Array(diasMes).fill(null).map((_,i)=>{const d=i+1,isH=d===hoy.getDate()&&m===hoy.getMonth()&&y===hoy.getFullYear(),isS=d===tmp.getDate();return <div key={d} onClick={()=>setTmp(new Date(y,m,d))} style={{fontSize:12,textAlign:"center",padding:"6px 2px",borderRadius:6,cursor:"pointer",background:isS?T.green:"none",color:isS?"#fff":isH?T.greenT:T.tx,fontWeight:isH?600:400}}>{d}</div>;})}
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button onClick={onCancel} style={{flex:1,padding:8,border:`0.5px solid ${T.border2}`,borderRadius:8,background:"none",cursor:"pointer",fontSize:13,color:T.tx2}}>Cancelar</button>
        <button onClick={()=>onConfirm(tmp)} style={{flex:1,padding:8,border:"none",borderRadius:8,background:T.green,cursor:"pointer",fontSize:13,fontWeight:500,color:"#fff"}}>Confirmar</button>
      </div>
    </div>
  </div>);
}

function NuevoMovSheet({onClose,onSave}){
  const[tipo,setTipo]=useState(null);
  const[monto,setMonto]=useState("");
  const[showCalc,setShowCalc]=useState(false);
  const[calcInit,setCalcInit]=useState("0");
  const[form,setForm]=useState({});
  const n=ahora();
  useEffect(()=>{if(tipo)setForm({fecha:n.fecha,hora:n.hora,cuenta:"billetera",categoria:tipo==="ingreso"?"Sueldo":"Alimentacion",descripcion:"",cuentaOrigen:"billetera",cuentaDestino:"nacion",frecuencia:"Mensual",debito:"automatico",esIngreso:"gasto"})},[tipo]);
  function set(k,v){setForm(f=>({...f,[k]:v}))}
  function guardar(){
    const m=parseFloat(monto);if(!m||m<=0){alert("Ingresá un monto válido");return}
    const id=Date.now().toString(),base={id,monto:m,fecha:form.fecha,hora:form.hora,descripcion:form.descripcion};
    if(tipo==="periodico"){savePer([...getPer(),{...base,frecuencia:form.frecuencia,debito:form.debito,esIngreso:form.esIngreso==="ingreso",cuentaId:form.cuenta,cuenta:cuentaNombre(form.cuenta),categoria:form.categoria}]);}
    else{const mov={...base,tipo};if(tipo==="transferencia"){mov.cuentaOrigenId=form.cuentaOrigen;mov.cuentaOrigen=cuentaNombre(form.cuentaOrigen);mov.cuentaDestinoId=form.cuentaDestino;mov.cuentaDestino=cuentaNombre(form.cuentaDestino);}else{mov.cuentaId=form.cuenta;mov.cuenta=cuentaNombre(form.cuenta);mov.categoria=form.categoria}saveMov([...getMov(),mov]);}
    onSave(tipo,form.fecha);
  }
  function Campo({label,id,tipo:t="text",opciones=null}){
    return(<div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:10}}>
      <label style={{fontSize:10,fontWeight:500,color:T.tx3,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</label>
      {opciones?<select value={form[id]||""} onChange={e=>set(id,e.target.value)} style={{padding:"8px 10px",border:`0.5px solid ${T.border2}`,borderRadius:8,fontSize:13,background:T.card2,color:T.tx,outline:"none"}}>{opciones.map(o=><option key={o.id||o} value={o.id||o}>{o.name||o}</option>)}</select>
      :t==="textarea"?<textarea value={form[id]||""} onChange={e=>set(id,e.target.value)} style={{padding:"8px 10px",border:`0.5px solid ${T.border2}`,borderRadius:8,fontSize:13,resize:"none",height:52,fontFamily:"inherit",color:T.tx,background:T.card2,outline:"none"}} placeholder="Descripción opcional..."/>
      :<input type={t} value={form[id]||""} onChange={e=>set(id,e.target.value)} style={{padding:"8px 10px",border:`0.5px solid ${T.border2}`,borderRadius:8,fontSize:13,color:T.tx,background:T.card2,outline:"none"}}/>}
    </div>);
  }
  function Toggle({label,id,options}){
    return(<div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:10}}>
      <label style={{fontSize:10,fontWeight:500,color:T.tx3,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</label>
      <div style={{display:"flex",gap:5}}>{options.map(o=><button key={o.val} onClick={()=>set(id,o.val)} style={{flex:1,padding:"7px 4px",border:`0.5px solid ${form[id]===o.val?T.purple:T.border2}`,borderRadius:8,background:form[id]===o.val?T.purpleL:"none",cursor:"pointer",fontSize:11,color:form[id]===o.val?T.purple:T.tx2,fontWeight:form[id]===o.val?500:400}}>{o.label}</button>)}</div>
    </div>);
  }
  const tipos=[{id:"gasto",label:"Gasto",color:"#E24B4A",bg:T.redL,icon:"↑"},{id:"ingreso",label:"Ingreso",color:T.greenT,bg:T.greenL,icon:"↓"},{id:"transferencia",label:"Transferencia",color:T.blue,bg:T.blueL,icon:"⇄"},{id:"periodico",label:"Periódico",color:T.purple,bg:T.purpleL,icon:"↺"}];
  const titulos={gasto:"Nuevo gasto",ingreso:"Nuevo ingreso",transferencia:"Nueva transferencia",periodico:"Nuevo periódico"};
  return(<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"flex-end",zIndex:200}}>
    <div style={{width:"100%",background:T.card,borderRadius:"18px 18px 0 0",paddingBottom:24,maxHeight:"90%",overflowY:"auto"}}>
      <div style={{width:36,height:4,background:T.border2,borderRadius:2,margin:"10px auto 0"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px 10px",borderBottom:`0.5px solid ${T.border}`}}>
        <span style={{fontSize:15,fontWeight:600,color:T.tx}}>{tipo?titulos[tipo]:"Nuevo movimiento"}</span>
        <button onClick={onClose} style={{width:28,height:28,border:"none",background:T.card2,borderRadius:"50%",cursor:"pointer",fontSize:16,color:T.tx2}}>✕</button>
      </div>
      {!tipo?(<>
        <p style={{padding:"10px 16px 3px",fontSize:12,color:T.tx3}}>Seleccioná el tipo</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"0 16px 12px"}}>
          {tipos.map(t=><button key={t.id} onClick={()=>setTipo(t.id)} style={{padding:"14px 6px",border:`0.5px solid ${T.border2}`,borderRadius:12,background:T.card2,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,fontSize:12,fontWeight:500,color:T.tx2}}>
            <span style={{fontSize:26,background:t.bg,width:44,height:44,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:t.color}}>{t.icon}</span>{t.label}
          </button>)}
        </div>
      </>):(<div style={{padding:"0 16px 8px"}}>
        <div style={{margin:"10px 0 4px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1,display:"flex",alignItems:"center",borderBottom:`2px solid ${T.green}`,paddingBottom:4,minWidth:0}}>
              <span style={{fontSize:16,color:T.tx3,marginRight:3,flexShrink:0}}>$</span>
              <input autoFocus type="number" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="0,00" style={{width:"100%",minWidth:0,padding:"4px 0",border:"none",fontFamily:"monospace",fontSize:22,fontWeight:500,color:T.tx,background:"none",outline:"none",textAlign:"center"}}/>
            </div>
            <button onClick={()=>{setCalcInit(monto||"0");setShowCalc(v=>!v)}} style={{width:40,height:40,border:`0.5px solid ${showCalc?T.blue:T.border2}`,borderRadius:8,background:showCalc?T.blueL:"none",cursor:"pointer",fontSize:18,color:showCalc?T.blue:T.tx3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>🧮</button>
          </div>
          {showCalc&&<Calculadora init={calcInit} onResult={r=>{setMonto(String(r));setShowCalc(false)}}/>}
        </div>
        <div style={{height:10}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Campo label="Fecha" id="fecha" tipo="date"/>
          <Campo label="Hora" id="hora" tipo="time"/>
        </div>
        {(tipo==="gasto"||tipo==="ingreso")&&(<><Campo label="Cuenta" id="cuenta" opciones={CUENTAS}/><Campo label="Categoría" id="categoria" opciones={tipo==="ingreso"?CAT_ING:CAT_GASTO}/><Campo label="Descripción" id="descripcion" tipo="textarea"/></>)}
        {tipo==="transferencia"&&(<><Campo label="Cuenta que envía" id="cuentaOrigen" opciones={CUENTAS}/><Campo label="Cuenta que recibe" id="cuentaDestino" opciones={CUENTAS}/><Campo label="Descripción" id="descripcion" tipo="textarea"/></>)}
        {tipo==="periodico"&&(<>
          <Toggle label="Frecuencia" id="frecuencia" options={[{val:"Mensual",label:"Mensual"},{val:"Bimestral",label:"Bimestral"},{val:"Anual",label:"Anual"}]}/>
          <Toggle label="Tipo de pago" id="debito" options={[{val:"automatico",label:"Débito auto"},{val:"vencimiento",label:"Con vencimiento"}]}/>
          <Toggle label="Tipo" id="esIngreso" options={[{val:"gasto",label:"Gasto"},{val:"ingreso",label:"Ingreso"}]}/>
          <Campo label="Cuenta" id="cuenta" opciones={CUENTAS}/><Campo label="Categoría" id="categoria" opciones={CAT_GASTO}/><Campo label="Descripción" id="descripcion" tipo="textarea"/>
        </>)}
        <button onClick={guardar} style={{width:"100%",padding:12,background:T.green,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>Guardar movimiento</button>
      </div>)}
    </div>
  </div>);
}

function TabMovimientos({curDate,busqueda,tick}){
  const[movs,setMovs]=useState(getMov);
  useEffect(()=>setMovs(getMov()),[curDate,busqueda,tick]);
  const filtrados=movs.filter(m=>{if(busqueda){const q=busqueda.toLowerCase();return(m.descripcion||"").toLowerCase().includes(q)||(m.categoria||"").toLowerCase().includes(q)||(m.cuenta||"").toLowerCase().includes(q)||(m.cuentaOrigen||"").toLowerCase().includes(q)||(m.cuentaDestino||"").toLowerCase().includes(q)}const[y,mo]=m.fecha.split("-");return +y===curDate.getFullYear()&&+mo===curDate.getMonth()+1;}).sort((a,b)=>(b.fecha+b.hora)>(a.fecha+a.hora)?1:-1);
  const tI=filtrados.filter(m=>m.tipo==="ingreso").reduce((s,m)=>s+ +m.monto,0);
  const tG=filtrados.filter(m=>m.tipo==="gasto"||m.tipo==="periodico").reduce((s,m)=>s+ +m.monto,0);
  function eliminar(id){if(!confirm("¿Eliminar este movimiento?"))return;const n=getMov().filter(m=>m.id!==id);saveMov(n);setMovs(n)}
  const grupos={};filtrados.forEach(m=>{if(!grupos[m.fecha])grupos[m.fecha]=[];grupos[m.fecha].push(m)});
  const dias=Object.keys(grupos).sort((a,b)=>b>a?1:-1);
  const ts={gasto:{bg:T.redL,fg:"#E24B4A",ico:"↑"},ingreso:{bg:T.greenL,fg:T.greenT,ico:"↓"},transferencia:{bg:T.blueL,fg:T.blue,ico:"⇄"},periodico:{bg:T.purpleL,fg:T.purple,ico:"↺"}};
  return(<div>
    <SummaryBar ing={tI} gas={tG}/>
    {busqueda&&<div style={{fontSize:10,color:T.tx3,padding:"7px 16px 4px",background:T.card2,borderBottom:`0.5px solid ${T.border}`}}>{filtrados.length} resultado(s) para: {busqueda}</div>}
    {!filtrados.length?<EmptyState icon="🧾" msg={busqueda?"Sin resultados":"Sin movimientos este mes"}/>:dias.map(d=>{
      let dt=0;grupos[d].forEach(m=>{if(m.tipo==="ingreso")dt+=+m.monto;else if(m.tipo==="gasto"||m.tipo==="periodico")dt-=+m.monto});
      return(<div key={d}>
        <div style={{fontSize:10,fontWeight:500,color:T.tx2,textTransform:"uppercase",letterSpacing:".05em",padding:"7px 16px 4px",background:T.card2,borderBottom:`0.5px solid ${T.border}`,display:"flex",justifyContent:"space-between"}}>
          <span>{labelDia(d)}</span><span style={{color:dt>=0?T.greenT:"#f09595"}}>{(dt>=0?"+":"")+fmt(Math.abs(dt))}</span>
        </div>
        {grupos[d].map(m=>{const t=ts[m.tipo]||ts.gasto,ac=m.tipo==="ingreso"?T.greenT:m.tipo==="transferencia"?T.blue:"#f09595",sg=m.tipo==="ingreso"?"+":m.tipo==="transferencia"?"":"-",meta=m.tipo==="transferencia"?`${m.cuentaOrigen} → ${m.cuentaDestino} · ${m.hora}`:`${m.cuenta||""} · ${m.categoria||""} · ${m.hora}`,desc=m.descripcion||(m.tipo==="transferencia"?"Transferencia":m.categoria||m.tipo);
          return(<div key={m.id} onClick={()=>eliminar(m.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",borderBottom:`0.5px solid ${T.border}`,cursor:"pointer"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:t.bg,color:t.fg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{t.ico}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:T.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{desc}</div><div style={{fontSize:10,color:T.tx3,marginTop:1}}>{meta}</div></div>
            <div style={{fontSize:13,fontWeight:500,fontFamily:"monospace",whiteSpace:"nowrap",color:ac}}>{sg}{fmt(m.monto)}</div>
          </div>);
        })}
      </div>);
    })}
  </div>);
}

function TabPeriodicos({busqueda,tick}){
  const[pers,setPers]=useState(getPer);
  useEffect(()=>setPers(getPer()),[tick]);
  const filtrados=busqueda?pers.filter(p=>(p.descripcion||"").toLowerCase().includes(busqueda.toLowerCase())||(p.categoria||"").toLowerCase().includes(busqueda.toLowerCase())):pers;
  const gT=filtrados.filter(p=>!p.esIngreso).reduce((s,p)=>s+ +p.monto,0),iT=filtrados.filter(p=>p.esIngreso).reduce((s,p)=>s+ +p.monto,0);
  function eliminar(id){if(!confirm("¿Eliminar?"))return;const n=getPer().filter(p=>p.id!==id);savePer(n);setPers(n)}
  const secciones=[{label:"Débito automático",items:filtrados.filter(p=>p.debito==="automatico"&&!p.esIngreso)},{label:"Con vencimiento",items:filtrados.filter(p=>p.debito!=="automatico"&&!p.esIngreso)},{label:"Ingresos recurrentes",items:filtrados.filter(p=>p.esIngreso)}];
  return(<div>
    <div style={{display:"flex",gap:6,padding:"8px 16px",borderBottom:`0.5px solid ${T.border}`}}>
      <div style={{flex:1,padding:"6px 4px",borderRadius:8,background:T.redL,textAlign:"center"}}><div style={{fontSize:10,color:T.tx3,marginBottom:1}}>Gastos fijos</div><div style={{fontSize:11,fontWeight:500,fontFamily:"monospace",color:"#f09595"}}>{fmt(gT)}</div></div>
      <div style={{flex:1,padding:"6px 4px",borderRadius:8,background:T.greenL,textAlign:"center"}}><div style={{fontSize:10,color:T.tx3,marginBottom:1}}>Ingresos fijos</div><div style={{fontSize:11,fontWeight:500,fontFamily:"monospace",color:T.greenT}}>{fmt(iT)}</div></div>
    </div>
    {!filtrados.length?<EmptyState icon="🔁" msg="Sin periódicos cargados"/>:secciones.map(sec=>!sec.items.length?null:(<div key={sec.label}>
      <div style={{fontSize:10,fontWeight:500,color:T.tx3,textTransform:"uppercase",letterSpacing:".05em",padding:"8px 16px 4px",background:T.card2,borderBottom:`0.5px solid ${T.border}`}}>{sec.label}</div>
      {sec.items.map(p=>(<div key={p.id} onClick={()=>eliminar(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",borderBottom:`0.5px solid ${T.border}`,cursor:"pointer"}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:p.esIngreso?T.greenL:T.purpleL,color:p.esIngreso?T.greenT:T.purple,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>↺</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:T.tx}}>{p.descripcion||p.categoria}</div><div style={{fontSize:10,color:T.tx3,marginTop:1}}>{p.frecuencia} · {p.cuenta}</div></div>
        <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
          <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,fontWeight:500,background:p.debito==="automatico"?T.greenL:T.amberL,color:p.debito==="automatico"?T.greenT:T.amber}}>{p.debito==="automatico"?"Automático":"Manual"}</span>
          <span style={{fontSize:12,fontFamily:"monospace",fontWeight:500,color:p.esIngreso?T.greenT:"#f09595"}}>{p.esIngreso?"+":"-"}{fmt(p.monto)}</span>
        </div>
      </div>))}
    </div>))}
  </div>);
}

function TabAnalisis({curDate,tick}){
  const movs=getMov().filter(m=>{const[y,mo]=m.fecha.split("-");return +y===curDate.getFullYear()&&+mo===curDate.getMonth()+1});
  const gas=movs.filter(m=>m.tipo==="gasto"||m.tipo==="periodico"),ct={};
  gas.forEach(m=>{const c=m.categoria||"Otros";ct[c]=(ct[c]||0)+ +m.monto});
  const tot=Object.values(ct).reduce((a,b)=>a+b,0),srt=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  if(!srt.length)return <EmptyState icon="📊" msg="Sin gastos este mes"/>;
  const r=70,cx=100,cy=100,stroke=40;let offset=0;
  const slices=srt.map(([cat,amt])=>{const arc=amt/tot*2*Math.PI*r,s={cat,amt,arc,offset,color:CAT_COLORES[cat]||"#B4B2A9"};offset+=arc;return s});
  return(<div>
    <div style={{display:"flex",justifyContent:"center",padding:16}}>
      <svg width={200} height={200} viewBox="0 0 200 200">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.card2} strokeWidth={stroke}/>
        {slices.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${s.arc} ${2*Math.PI*r}`} strokeDashoffset={-s.offset+Math.PI*r*0.5} transform="rotate(-90, 100, 100)"/>)}
        <text x={cx} y={cy-8} textAnchor="middle" fontSize={11} fill={T.tx3}>Total gastos</text>
        <text x={cx} y={cy+10} textAnchor="middle" fontSize={13} fontWeight="500" fill={T.tx}>{fmt(tot)}</text>
      </svg>
    </div>
    <div style={{fontSize:10,fontWeight:500,color:T.tx3,textTransform:"uppercase",letterSpacing:".04em",padding:"7px 16px",background:T.card2,borderTop:`0.5px solid ${T.border}`,borderBottom:`0.5px solid ${T.border}`,display:"flex"}}>
      <span>Categoría</span><span style={{flex:1}}/><span style={{minWidth:70,textAlign:"right"}}>Monto</span><span style={{minWidth:28,textAlign:"right"}}>%</span>
    </div>
    {srt.map(([cat,amt])=>{const pct=Math.round(amt/tot*100),bw=Math.round(amt/srt[0][1]*100),col=CAT_COLORES[cat]||"#B4B2A9";return(<div key={cat} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 16px",borderBottom:`0.5px solid ${T.border}`}}>
      <div style={{width:9,height:9,borderRadius:"50%",background:col,flexShrink:0}}/><div style={{flex:1,fontSize:12,color:T.tx}}>{cat}</div>
      <div style={{width:50,height:3,background:T.card2,borderRadius:2,overflow:"hidden"}}><div style={{width:bw+"%",height:"100%",background:col,borderRadius:2}}/></div>
      <div style={{fontSize:12,fontFamily:"monospace",color:T.tx,minWidth:65,textAlign:"right"}}>{fmt(amt)}</div>
      <div style={{fontSize:10,color:T.tx3,minWidth:28,textAlign:"right"}}>{pct}%</div>
    </div>);})}
  </div>);
}

function TabCuentas(){
  const movs=getMov(),saldos={};CUENTAS.forEach(c=>{saldos[c.id]=0});
  movs.forEach(m=>{if(m.tipo==="ingreso")saldos[m.cuentaId]=(saldos[m.cuentaId]||0)+ +m.monto;else if(m.tipo==="gasto"||m.tipo==="periodico")saldos[m.cuentaId]=(saldos[m.cuentaId]||0)- +m.monto;else if(m.tipo==="transferencia"){saldos[m.cuentaOrigenId]=(saldos[m.cuentaOrigenId]||0)- +m.monto;saldos[m.cuentaDestinoId]=(saldos[m.cuentaDestinoId]||0)+ +m.monto}});
  const patrimonio=Object.values(saldos).reduce((a,b)=>a+b,0),grupos={};CUENTAS.forEach(c=>{if(!grupos[c.type])grupos[c.type]=[];grupos[c.type].push(c)});
  return(<div style={{padding:"14px 16px"}}>
    <div style={{background:"linear-gradient(135deg,#1D9E75,#085041)",borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:3}}>Patrimonio neto</div><div style={{fontSize:22,fontWeight:600,color:"#fff",fontFamily:"monospace"}}>{fmt(patrimonio)}</div></div>
      <span style={{fontSize:28,opacity:.7}}>📈</span>
    </div>
    {Object.entries(grupos).map(([tipo,cuentas])=>(<div key={tipo}>
      <div style={{fontSize:10,fontWeight:500,color:T.tx3,textTransform:"uppercase",letterSpacing:".05em",margin:"12px 0 6px"}}>{tipo}</div>
      {cuentas.map(c=>{const bal=saldos[c.id]||0;return(<div key={c.id} style={{border:`0.5px solid ${T.border}`,borderRadius:8,padding:"10px 12px",marginBottom:7,display:"flex",alignItems:"center",gap:10,background:T.card}}>
        <div style={{width:36,height:36,borderRadius:8,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{c.icon}</div>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:T.tx}}>{c.name}</div><div style={{fontSize:10,color:T.tx3,marginTop:1}}>{c.type}</div></div>
        <div style={{fontSize:14,fontWeight:600,fontFamily:"monospace",color:bal>=0?T.greenT:"#f09595"}}>{fmt(bal)}</div>
      </div>);})}
    </div>))}
  </div>);
}

function IcoMov({c}){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>)}
function IcoPer({c}){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>)}
function IcoAna({c}){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>)}
function IcoCue({c}){return(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>)}

function App(){
  const[tab,setTab]=useState("mov");
  const[curDate,setCurDate]=useState(new Date());
  const[busqueda,setBusqueda]=useState("");
  const[showSheet,setShowSheet]=useState(false);
  const[showCal,setShowCal]=useState(false);
  const[tick,setTick]=useState(0);
  const hasTop=tab!=="cue";
  const tabs=[{id:"mov",label:"Movimientos",I:IcoMov},{id:"per",label:"Periódicos",I:IcoPer},{id:"ana",label:"Análisis",I:IcoAna},{id:"cue",label:"Cuentas",I:IcoCue}];
  function onSave(tipo,fecha){setShowSheet(false);if(tipo==="periodico")setTab("per");else{const d=new Date(fecha+"T12:00:00");setCurDate(new Date(d.getFullYear(),d.getMonth(),1));setTab("mov")}setTick(t=>t+1)}
  return(<div style={{width:"100%",maxWidth:520,height:"100vh",margin:"0 auto",background:T.bg,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
    {/* Header */}
    <div style={{padding:"14px 20px 0",background:T.bg,borderBottom:`0.5px solid ${T.border}`,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:20,fontWeight:600,color:T.green,letterSpacing:-.5}}>Finanz<span style={{color:T.tx}}>App</span></span>
        <Reloj/>
      </div>
      {hasTop&&(<>
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.tx3}}>🔍</span>
          <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="Buscar movimientos..." style={{width:"100%",padding:"8px 36px 8px 34px",border:`0.5px solid ${T.border2}`,borderRadius:10,fontSize:13,background:T.card,color:T.tx,outline:"none"}}/>
          {busqueda&&<button onClick={()=>setBusqueda("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:T.tx3}}>✕</button>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <button onClick={()=>{const d=new Date(curDate);d.setMonth(d.getMonth()-1);setCurDate(d)}} style={{width:32,height:32,border:`0.5px solid ${T.border2}`,borderRadius:8,background:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:T.tx2}}>‹</button>
          <button onClick={()=>setShowCal(true)} style={{flex:1,padding:"6px 12px",border:`0.5px solid ${T.border2}`,borderRadius:8,background:T.card,fontSize:13,fontWeight:500,color:T.tx,cursor:"pointer",textAlign:"center"}}>{MESES[curDate.getMonth()]} {curDate.getFullYear()}</button>
          <button onClick={()=>{const d=new Date(curDate);d.setMonth(d.getMonth()+1);setCurDate(d)}} style={{width:32,height:32,border:`0.5px solid ${T.border2}`,borderRadius:8,background:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:T.tx2}}>›</button>
        </div>
      </>)}
    </div>
    {/* Contenido */}
    <div style={{flex:1,overflowY:"auto",background:T.bg}}>
      {tab==="mov"&&<TabMovimientos key={tick} curDate={curDate} busqueda={busqueda} tick={tick}/>}
      {tab==="per"&&<TabPeriodicos key={"p"+tick} busqueda={busqueda} tick={tick}/>}
      {tab==="ana"&&<TabAnalisis key={"a"+tick} curDate={curDate} tick={tick}/>}
      {tab==="cue"&&<TabCuentas key={"c"+tick}/>}
    </div>
    {/* FAB */}
    <button onClick={()=>setShowSheet(true)} style={{position:"absolute",bottom:70,right:24,width:54,height:54,borderRadius:"50%",background:"#378ADD",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:"#fff",boxShadow:"0 4px 16px rgba(55,138,221,.55)",zIndex:50}}>+</button>
    {/* Bottom nav */}
    <div style={{display:"flex",borderTop:`0.5px solid ${T.border}`,background:T.bg,flexShrink:0,paddingBottom:8,paddingTop:4}}>
      {tabs.map(({id,label,I})=>{const active=tab===id,color=active?T.greenT:T.tx3;return(
        <button key={id} onClick={()=>{setTab(id);setBusqueda("")}} style={{flex:1,padding:"6px 4px 4px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:active?`2px solid ${T.greenT}`:"2px solid transparent"}}>
          <I c={color}/><span style={{fontSize:10,fontWeight:500,color}}>{label}</span>
        </button>
      );})}
    </div>
    {showSheet&&<NuevoMovSheet onClose={()=>setShowSheet(false)} onSave={onSave}/>}
    {showCal&&<Calendario fecha={`${curDate.getFullYear()}-${String(curDate.getMonth()+1).padStart(2,"0")}-01`} onConfirm={d=>{setCurDate(new Date(d.getFullYear(),d.getMonth(),1));setShowCal(false)}} onCancel={()=>setShowCal(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
