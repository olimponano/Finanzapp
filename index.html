// FULL DATE PICKER
function FullDatePicker({ selected, onChange, onClose }) {
  const init = selected ? new Date(selected) : new Date();
  const [mode, setMode] = useState("day");
  const [viewMonth, setViewMonth] = useState(init.getMonth());
  const [viewYear, setViewYear] = useState(init.getFullYear());

  function prevMonth() { if (viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); }
  function nextMonth() { if (viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); }

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);

  const selDate = selected ? new Date(selected) : null;
  const isSelected = (d) => selDate && selDate.getDate()===d && selDate.getMonth()===viewMonth && selDate.getFullYear()===viewYear;
  const isToday = (d) => { const t=new Date(); return t.getDate()===d && t.getMonth()===viewMonth && t.getFullYear()===viewYear; };

  const yearRange = [];
  for (let y=viewYear-10;y<=viewYear+10;y++) yearRange.push(y);

  return (
    <div style={{ position:"fixed", inset:0, zIndex:400, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.7)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:16, padding:20, width:300, boxShadow:"0 8px 32px rgba(0,0,0,0.5)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          {mode==="day" ? <button onClick={prevMonth} style={{ background:"none", border:"none", color:COLORS.textPrimary, fontSize:20, cursor:"pointer", padding:"0 8px" }}>‹</button> : <div style={{width:36}}/>}
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={() => setMode(mode==="month"?"day":"month")} style={{ background:mode==="month"?COLORS.green:COLORS.surface2, border:"none", borderRadius:6, padding:"4px 10px", color:"white", fontWeight:600, fontSize:14, cursor:"pointer" }}>{MONTHS_SHORT[viewMonth]}</button>
            <button onClick={() => setMode(mode==="year"?"day":"year")} style={{ background:mode==="year"?COLORS.green:COLORS.surface2, border:"none", borderRadius:6, padding:"4px 10px", color:"white", fontWeight:600, fontSize:14, cursor:"pointer" }}>{viewYear}</button>
          </div>
          {mode==="day" ? <button onClick={nextMonth} style={{ background:"none", border:"none", color:COLORS.textPrimary, fontSize:20, cursor:"pointer", padding:"0 8px" }}>›</button> : <div style={{width:36}}/>}
        </div>

        {mode==="day" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:6 }}>
              {DAYS_SHORT.map(d => <div key={d} style={{ textAlign:"center", fontSize:11, color:COLORS.textMuted }}>{d}</div>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {cells.map((d,i) => (
                <button key={i} onClick={() => { if(d){onChange(new Date(viewYear,viewMonth,d));onClose();} }}
                  style={{ background:d&&isSelected(d)?COLORS.green:"none", border:d&&isToday(d)&&!isSelected(d)?"1px solid "+COLORS.green:"none", borderRadius:6, padding:"6px 0", color:d?(isSelected(d)?"white":COLORS.textPrimary):"transparent", fontSize:13, cursor:d?"pointer":"default", fontWeight:d&&isSelected(d)?700:400 }}>
                  {d||""}
                </button>
              ))}
            </div>
          </div>
        )}
        {mode==="month" && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
            {MONTHS_SHORT.map((m,i) => (
              <button key={i} onClick={() => {setViewMonth(i);setMode("day");}}
                style={{ background:i===viewMonth?COLORS.green:COLORS.surface2, border:"none", borderRadius:8, padding:"10px 0", color:"white", fontSize:13, fontWeight:i===viewMonth?700:400, cursor:"pointer" }}>{m}</button>
            ))}
          </div>
        )}
        {mode==="year" && (
          <div style={{ maxHeight:220, overflowY:"auto" }}>
            {yearRange.map(y => (
              <button key={y} onClick={() => {setViewYear(y);setMode("day");}}
                style={{ width:"100%", background:y===viewYear?COLORS.green:"none", border:"none", borderRadius:8, padding:"10px 0", color:y===viewYear?"white":COLORS.textPrimary, fontSize:14, fontWeight:y===viewYear?700:400, cursor:"pointer", display:"block" }}>{y}</button>
            ))}
          </div>
        )}
        <button onClick={onClose} style={{ marginTop:16, width:"100%", background:COLORS.border, border:"none", borderRadius:8, padding:"10px 0", color:COLORS.textSecondary, cursor:"pointer", fontSize:13 }}>Cancelar</button>
      </div>
    </div>
  );
}

        {MONTHS[d.getMonth()]} {d.getFullYear()}

// CALCULATOR
function Calculator({ initialValue, onResult, onClose }) {
  const [display, setDisplay] = useState(initialValue !== "" ? String(initialValue) : "0");
  const [prev, setPrev] = useState("");
  const [op, setOp] = useState("");
  const [waitNext, setWaitNext] = useState(false);

  function pressDigit(d) {
    if (waitNext) { setDisplay(d==="."?"0.":d); setWaitNext(false); }
    else if (d==="." && display.includes(".")) return;
    else setDisplay(display==="0" ? d : display+d);
  }
  function pressOp(o) { setPrev(display); setOp(o); setWaitNext(true); }
  function pressEqual() {
    if (!op||!prev) { onResult(parseFloat(display)); onClose(); return; }
    const a=parseFloat(prev), b=parseFloat(display);
    let res=a;
    if(op==="+") res=a+b;
    if(op==="-") res=a-b;
    if(op==="*") res=a*b;
    if(op==="/") res=b!==0?a/b:a;
    onResult(Math.round(res*100)/100);
    onClose();
  }
  function pressClear() { setDisplay("0"); setPrev(""); setOp(""); setWaitNext(false); }
  function pressBack() { setDisplay(display.length>1?display.slice(0,-1):"0"); }

  const btn = (bg, color) => ({ background:bg||COLORS.surface2, border:"1px solid "+COLORS.border, borderRadius:10, fontSize:18, fontWeight:600, color:color||COLORS.textPrimary, cursor:"pointer", padding:"14px 0", display:"flex", alignItems:"center", justifyContent:"center" });

  return (
    <div style={{ position:"absolute", top:"100%", right:0, zIndex:500, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:14, padding:12, width:220, boxShadow:"0 8px 24px rgba(0,0,0,0.5)", marginTop:4 }}>
      <div style={{ background:COLORS.bg, borderRadius:8, padding:"10px 14px", marginBottom:10, textAlign:"right" }}>
        {op && <div style={{ fontSize:11, color:COLORS.textMuted, marginBottom:2 }}>{prev} {op}</div>}
        <div style={{ fontSize:26, fontFamily:"monospace", fontWeight:700, color:COLORS.textPrimary, minHeight:32 }}>{waitNext?"":display}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6 }}>
        <button onClick={pressClear} style={{...btn(COLORS.red,"white"),gridColumn:"span 2",fontSize:14}}>AC</button>
        <button onClick={pressBack}  style={btn(COLORS.surface2,COLORS.blue)}>⌫</button>
        <button onClick={()=>pressOp("/")} style={btn(COLORS.surface2,COLORS.blue)}>÷</button>
        <button onClick={()=>pressDigit("7")} style={btn()}>7</button>
        <button onClick={()=>pressDigit("8")} style={btn()}>8</button>
        <button onClick={()=>pressDigit("9")} style={btn()}>9</button>
        <button onClick={()=>pressOp("*")} style={btn(COLORS.surface2,COLORS.blue)}>×</button>
        <button onClick={()=>pressDigit("4")} style={btn()}>4</button>
        <button onClick={()=>pressDigit("5")} style={btn()}>5</button>
        <button onClick={()=>pressDigit("6")} style={btn()}>6</button>
        <button onClick={()=>pressOp("-")} style={btn(COLORS.surface2,COLORS.blue)}>−</button>
        <button onClick={()=>pressDigit("1")} style={btn()}>1</button>
        <button onClick={()=>pressDigit("2")} style={btn()}>2</button>
        <button onClick={()=>pressDigit("3")} style={btn()}>3</button>
        <button onClick={()=>pressOp("+")} style={btn(COLORS.surface2,COLORS.blue)}>+</button>
        <button onClick={()=>pressDigit("0")} style={{...btn(),gridColumn:"span 2"}}>0</button>
        <button onClick={()=>pressDigit(".")} style={btn()}>.</button>
        <button onClick={pressEqual} style={btn(COLORS.green,"white")}>=</button>
      </div>
    </div>
  );
}

        <div style={{ fontSize:13, color:COLORS.textMuted, fontWeight:600, marginBottom:14, letterSpacing:"0.06em" }}>CATEGORIA</div>

          <button key={cat.id} onClick={() => { onSelect(cat); onClose(); }}

        )}

function AccountPicker({ accounts, selected, onSelect, onClose }) {
  const grouped = {};

  return (
    <div style={{ position:"fixed", inset:0, zIndex:350, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", padding:20, paddingBottom:40, maxHeight:"70vh", overflowY:"auto" }}>
        <div style={{ fontSize:13, color:COLORS.textMuted, fontWeight:600, marginBottom:14, letterSpacing:"0.06em" }}>CUENTA</div>
        {typeOrder.map(type => {
          const accs = grouped[type];
          if (!accs) return null;
          return (
            <div key={type}>
              <div style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.08em", marginBottom:6, paddingLeft:4 }}>{ACCOUNT_TYPES[type]}</div>
              {accs.map(acc => (
                <button key={acc.id} onClick={() => { onSelect(acc); onClose(); }}
                  style={{ width:"100%", background:selected&&selected.id===acc.id?COLORS.surface2:"none", border:selected&&selected.id===acc.id?"1px solid "+COLORS.green:"1px solid transparent", borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", marginBottom:6 }}>
                  <span style={{ fontSize:22 }}>{ACCOUNT_ICONS[acc.type]}</span>
                  <span style={{ color:COLORS.textPrimary, fontSize:15 }}>{acc.name}</span>
                  {selected&&selected.id===acc.id && <span style={{ marginLeft:"auto", color:COLORS.green, fontSize:18 }}>✓</span>}

              ))}
            </div>

        })}

      </div>
    </div>
  );
}

  const [hh, setHh] = useState(initTimeParts[0]||"00");
  const [mm, setMm] = useState(initTimeParts[1]||"00");
  const [category, setCategory] = useState(existing ? { id:"existing", label:existing.category, icon:existing.categoryIcon||"📦" } : null);
  const [account, setAccount] = useState(existing ? accounts.find(a=>a.id===existing.accountId)||null : null);
  const [accountDest, setAccountDest] = useState(existing ? accounts.find(a=>a.id===existing.accountDestId)||null : null);
  const [description, setDescription] = useState(existing ? (existing.description||"") : "");
  const [files, setFiles] = useState([]);
  const [showCal, setShowCal] = useState(false);
  const [showCatPicker, setShowCatPicker] = useState(false);
  const [showAccPicker, setShowAccPicker] = useState(false);
  const [showAccDestPicker, setShowAccDestPicker] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [confirmAction, setConfirmAction] = useState(null);

  const isTransferencia = tipo==="transferencia";
  const isGasto = tipo==="gasto";
  const accentColor = isTransferencia ? COLORS.blue : isGasto ? COLORS.red : COLORS.green;
  const icon = isTransferencia ? "⇄" : isGasto ? "↑" : "↓";
  const title = existing
    ? (isTransferencia ? "Editar transferencia" : isGasto ? "Editar gasto" : "Editar ingreso")

  const dateLabel = date ? date.getDate()+" de "+MONTHS_SHORT[date.getMonth()]+" "+date.getFullYear() : "Elegir fecha";

  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function handleSave() {
    const mov = {
      id: existing ? existing.id : Date.now(), tipo,
      amount: parseFloat(amount)||0,

function PieChart({ slices, size }) {
  const r = size / 2;
  const cx = r;
  const cy = r;
  const innerR = r * 0.55;
  let cumAngle = -Math.PI / 2;
  const paths = slices.map((s) => {
    const angle = s.pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const x2 = cx + r * Math.cos(cumAngle);
    const y2 = cy + r * Math.sin(cumAngle);
    const ix1 = cx + innerR * Math.cos(cumAngle - angle);
    const iy1 = cy + innerR * Math.sin(cumAngle - angle);
    const ix2 = cx + innerR * Math.cos(cumAngle);
    const iy2 = cy + innerR * Math.sin(cumAngle);
    const large = angle > Math.PI ? 1 : 0;
    const d = [
      "M", x1, y1,
      "A", r, r, 0, large, 1, x2, y2,
      "L", ix2, iy2,
      "A", innerR, innerR, 0, large, 0, ix1, iy1,
      "Z"
    ].join(" ");
    return { d, color: s.color };
  });
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {paths.map((p, i) => <path key={i} d={p.d} fill={p.color} />)}
    </svg>
  );
}

function fmtShort(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,"") + "k";
  return String(Math.round(n));
}

function VerticalBarChart({ cats, colors }) {
  const max = cats.reduce((m, c) => c.total > m ? c.total : m, 0) || 1;
  const barW = 36;
  const gap = 12;
  const LABEL_H = 38;
  const BAR_AREA_H = 200 - LABEL_H - 1;
  const totalW = cats.length * (barW + gap);

  return (
    <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column" }}>
      {/* Bars area with hidden scrollbar */}
      <div style={{ flex:1, overflowX:"auto", overflowY:"hidden", scrollbarWidth:"none", msOverflowStyle:"none" }}>
        <style>{".no-scroll::-webkit-scrollbar{display:none}"}</style>
        <div className="no-scroll" style={{ width:totalW, height:"100%", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, display:"flex", alignItems:"flex-end", gap:gap }}>
            {cats.map((cat, i) => {
              const barH = Math.max(4, Math.round((cat.total / max) * (BAR_AREA_H - 16)));
              const color = colors[i % colors.length];
              return (
                <div key={cat.label} style={{ flexShrink:0, width:barW, display:"flex", flexDirection:"column", alignItems:"center" }}>
                  <span style={{ fontSize:10, color:COLORS.textSecondary, fontFamily:"monospace", whiteSpace:"nowrap", marginBottom:3 }}>{fmtShort(cat.total)}</span>
                  <div style={{ width:barW, height:barH, background:color, borderRadius:"4px 4px 0 0" }} />
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {/* Baseline full width */}
      <div style={{ height:1, background:COLORS.border, flexShrink:0, width:"100%" }} />
      {/* Labels row with hidden scrollbar, synced width */}
      <div style={{ height:LABEL_H, overflowX:"auto", overflowY:"hidden", scrollbarWidth:"none", msOverflowStyle:"none", flexShrink:0 }}>
        <div style={{ width:totalW, display:"flex", gap:gap, paddingTop:6 }}>
          {cats.map((cat, i) => (
            <div key={cat.label} style={{ flexShrink:0, width:barW, fontSize:10, color:COLORS.textSecondary, textAlign:"center", lineHeight:1.2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {cat.icon} {cat.label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const PERIODOS = [
  { id:"semana",    label:"Semanal" },
  { id:"mensual",   label:"Mensual" },
  { id:"trimestre", label:"Trimestral" },
  { id:"semestre",  label:"Semestral" },
  { id:"anual",     label:"Anual" },
];

function PeriodoPicker({ periodo, onChange, onClose }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:350, display:"flex", flexDirection:"column", justifyContent:"flex-end", alignItems:"center" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", padding:20, paddingBottom:40, width:"100%", maxWidth:500, boxSizing:"border-box" }}>
        <div style={{ fontSize:13, color:COLORS.textMuted, fontWeight:600, marginBottom:14, letterSpacing:"0.06em" }}>PERIODO</div>
        {PERIODOS.map(p => (
          <button key={p.id} onClick={() => { onChange(p.id); onClose(); }}
            style={{ width:"100%", boxSizing:"border-box", background: periodo===p.id ? COLORS.surface2 : "none", border: periodo===p.id ? "1px solid "+COLORS.green : "1px solid transparent", borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", marginBottom:6 }}>
            <span style={{ color:COLORS.textPrimary, fontSize:15 }}>{p.label}</span>
            {periodo===p.id && <span style={{ color:COLORS.green, fontSize:18 }}>✓</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

function getDateRange(selectedDate, periodo) {
  const d = new Date(selectedDate);
  const y = d.getFullYear();
  const m = d.getMonth();
  const day = d.getDate();
  if (periodo==="semana") {
    const dow = d.getDay();
    const start = new Date(y, m, day - dow);
    const end = new Date(y, m, day - dow + 6);
    return { start, end, label: start.getDate()+"/"+(start.getMonth()+1)+" - "+end.getDate()+"/"+(end.getMonth()+1)+"/"+end.getFullYear() };
  }
  if (periodo==="mensual") {
    return { start: new Date(y,m,1), end: new Date(y,m+1,0), label: ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m]+" "+y };
  }
  if (periodo==="trimestre") {
    const q = Math.floor(m/3);
    const sm = q*3;
    return { start: new Date(y,sm,1), end: new Date(y,sm+3,0), label: "T"+(q+1)+" "+y };
  }
  if (periodo==="semestre") {
    const sm = m < 6 ? 0 : 6;
    return { start: new Date(y,sm,1), end: new Date(y,sm+6,0), label: (sm===0?"1er":"2do")+" semestre "+y };
  }
  if (periodo==="anual") {
    return { start: new Date(y,0,1), end: new Date(y,11,31), label: String(y) };
  }
  return { start: new Date(y,m,1), end: new Date(y,m+1,0), label: "" };
}

function TabAnalisis({ selectedDate, onDateChange, movimientos }) {
  const [vista, setVista] = useState("gastos");
  const [chartType, setChartType] = useState("pie");
  const [periodo, setPeriodo] = useState("mensual");
  const [showPeriodo, setShowPeriodo] = useState(false);

  const range = getDateRange(selectedDate, periodo);

  const filtered = movimientos.filter(m => {
    const d = new Date(m.date);
    return d >= range.start && d <= range.end;
  });

  const gastos   = filtered.filter(m => m.tipo==="gasto");
  const ingresos = filtered.filter(m => m.tipo==="ingreso");
  const totalGastos   = gastos.reduce((s,m) => s+m.amount, 0);
  const totalIngresos = ingresos.reduce((s,m) => s+m.amount, 0);
  const totalTodo = totalGastos + totalIngresos;

  function agruparPorCategoria(movs) {
    const map = {};
    movs.forEach(m => {
      const key = m.category || "Sin categoria";
      const icon = key==="Sin categoria" ? "" : (m.categoryIcon||"📦");
      if (!map[key]) map[key] = { label:key, icon, total:0 };
      map[key].total += m.amount;
    });
    return Object.values(map).sort((a,b) => b.total - a.total);
  }

  const catGastos   = agruparPorCategoria(gastos);
  const catIngresos = agruparPorCategoria(ingresos);

  function buildSlices(cats, total) {
    return cats.map((c, i) => ({ pct: total > 0 ? c.total/total : 0, color: CAT_COLORS[i % CAT_COLORS.length] }));
  }

  const btnVista = (id, label, color) => ({
    style: { flex:1, padding:"10px 0", borderRadius:10, border:"none", cursor:"pointer", fontSize:13, fontWeight:600, background: vista===id ? color : COLORS.surface, color: vista===id ? "white" : COLORS.textSecondary },
    onClick: () => setVista(id),
    children: label,
  });

  const showEmpty = (vista==="gastos" && catGastos.length===0) || (vista==="ingresos" && catIngresos.length===0) || (vista==="todos" && totalTodo===0);
  const activeCats  = vista==="gastos" ? catGastos : catIngresos;
  const activeTotal = vista==="gastos" ? totalGastos : totalIngresos;
  const activeColor = vista==="gastos" ? COLORS.redSoft : COLORS.green;

  const IconPie = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
    </svg>
  );
  const IconBar = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="18" y1="20" x2="18" y2="4"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="6" y1="20" x2="6" y2="14"/>
      <line x1="2" y1="20" x2="22" y2="20"/>
    </svg>
  );
  const IconClock = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
  );

  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
        <button onClick={() => {
          const r = getDateRange(selectedDate, periodo);
          const prev = new Date(r.start);
          prev.setDate(prev.getDate() - 1);
          onDateChange(prev);
        }} style={{ background:COLORS.surface, border:"1px solid "+COLORS.border, color:COLORS.textPrimary, width:36, height:36, borderRadius:8, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>‹</button>
        <div style={{ flex:1, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", height:36, color:COLORS.textPrimary, fontSize:13, fontWeight:600 }}>{range.label}</div>
        <button onClick={() => {
          const r = getDateRange(selectedDate, periodo);
          const next = new Date(r.end);
          next.setDate(next.getDate() + 1);
          onDateChange(next);
        }} style={{ background:COLORS.surface, border:"1px solid "+COLORS.border, color:COLORS.textPrimary, width:36, height:36, borderRadius:8, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>›</button>
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <button {...btnVista("gastos",   "Gastos",   COLORS.red)} />
        <button {...btnVista("ingresos", "Ingresos", COLORS.green)} />
        <button {...btnVista("todos",    "Todos",    COLORS.blue)} />
      </div>

      {showEmpty ? (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 20px", textAlign:"center" }}>
          <div style={{ fontSize:48, marginBottom:12 }}>📊</div>
          <div style={{ color:COLORS.textSecondary, fontSize:16, fontWeight:500, marginBottom:6 }}>Sin datos para analizar</div>
          <div style={{ color:COLORS.textMuted, fontSize:13 }}>Agrega movimientos para ver estadisticas</div>
        </div>
      ) : vista==="todos" ? (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", marginBottom:24 }}>
          <div style={{ position:"relative", width:200, height:200 }}>
            <PieChart size={200} slices={totalTodo>0 ? [
              { pct: totalGastos/totalTodo, color: COLORS.redSoft },
              { pct: totalIngresos/totalTodo, color: COLORS.green },
            ] : [{ pct:1, color:COLORS.border }]} />
            <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
              <div style={{ fontSize:11, color:COLORS.textMuted }}>Balance</div>
              <div style={{ fontSize:16, fontFamily:"monospace", fontWeight:700, color: totalIngresos-totalGastos<0?COLORS.redSoft:COLORS.green }}>{fmt(totalIngresos-totalGastos)}</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:20, marginTop:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:COLORS.redSoft }} />
              <span style={{ color:COLORS.textSecondary, fontSize:13 }}>Gastos {totalTodo>0?Math.round(totalGastos/totalTodo*100):0}%</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:COLORS.green }} />
              <span style={{ color:COLORS.textSecondary, fontSize:13 }}>Ingresos {totalTodo>0?Math.round(totalIngresos/totalTodo*100):0}%</span>
            </div>
          </div>
        </div>
      ) : (
        <div>
          {/* Fixed height chart area with buttons inside at bottom corners */}
          <div style={{ height:200, position:"relative", marginBottom:16 }}>
            {chartType==="pie" ? (
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ position:"relative", width:200, height:200 }}>
                  <PieChart size={200} slices={buildSlices(activeCats, activeTotal)} />
                  <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
                    <div style={{ fontSize:11, color:COLORS.textMuted }}>Total</div>
                    <div style={{ fontSize:16, fontFamily:"monospace", fontWeight:700, color:activeColor }}>{fmt(activeTotal)}</div>
                  </div>
                </div>
              </div>
            ) : (
              <div style={{ position:"absolute", left:46, right:46, top:0, bottom:0 }}>
                <VerticalBarChart cats={activeCats} colors={CAT_COLORS} />
              </div>
            )}
            <button onClick={() => setShowPeriodo(true)}
              style={{ position:"absolute", left:0, bottom:0, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:10, width:38, height:38, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:COLORS.textSecondary, zIndex:2 }}>
              <IconClock />
            </button>
            <button onClick={() => setChartType(chartType==="pie"?"bar":"pie")}
              style={{ position:"absolute", right:0, bottom:0, background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:10, width:38, height:38, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:COLORS.textSecondary, zIndex:2 }}>
              {chartType==="pie" ? <IconBar /> : <IconPie />}
            </button>
          </div>

          {/* Category table always visible */}
          <div style={{ background:COLORS.surface, borderRadius:12, overflow:"hidden", marginBottom:16 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", padding:"8px 14px", borderBottom:"1px solid "+COLORS.border }}>
              <span style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.06em" }}>CATEGORIA</span>
              <span style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.06em", textAlign:"right", minWidth:70 }}>MONTO</span>
              <span style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.06em", textAlign:"right", minWidth:36 }}>%</span>
            </div>
            {activeCats.map((cat, i) => {
              const pct = activeTotal>0 ? Math.round(cat.total/activeTotal*100) : 0;
              const color = CAT_COLORS[i % CAT_COLORS.length];
              return (
                <div key={cat.label} style={{ display:"grid", gridTemplateColumns:"1fr auto auto", padding:"12px 14px", borderBottom: i<activeCats.length-1?"1px solid "+COLORS.border:"none", alignItems:"center" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:color, flexShrink:0 }} />
                    <span style={{ color:COLORS.textPrimary, fontSize:14 }}>{cat.icon} {cat.label}</span>
                  </div>
                  <span style={{ fontFamily:"monospace", fontSize:14, color:COLORS.textPrimary, textAlign:"right", minWidth:70 }}>{fmt(cat.total)}</span>
                  <span style={{ fontSize:13, color:COLORS.textMuted, textAlign:"right", minWidth:36 }}>{pct}%</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {showPeriodo && <PeriodoPicker periodo={periodo} onChange={setPeriodo} onClose={() => setShowPeriodo(false)} />}
    </div>
  );
}

// FORM CUENTA (agregar o editar)
function FormCuenta({ existing, onClose, onSave }) {
  const [name, setName] = useState(existing ? existing.name : "");
  const [type, setType] = useState(existing ? existing.type : "efectivo");
  const [confirm, setConfirm] = useState(false);
  const typeOrder = ["efectivo","debito","billetera_virtual","credito","inversion"];
  const fieldStyle = { width:"100%", boxSizing:"border-box", background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:10, padding:"12px 14px", color:COLORS.textPrimary, fontSize:14, outline:"none" };
  const labelStyle = { fontSize:12, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:6, display:"block" };

  function handleSave() {
    if (existing) { setConfirm(true); return; }
    onSave({ id: Date.now(), name:name.trim(), type, balance:0 });
    onClose();
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:300, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} />
      <div style={{ position:"relative", background:COLORS.surface, borderRadius:"20px 20px 0 0", padding:20, paddingBottom:40 }}>
        <div style={{ display:"flex", alignItems:"center", marginBottom:20 }}>
          <span style={{ color:COLORS.textPrimary, fontSize:18, fontWeight:700 }}>{existing ? "Editar cuenta" : "Nueva cuenta"}</span>
          <button onClick={onClose} style={{ marginLeft:"auto", background:"none", border:"none", color:COLORS.textSecondary, fontSize:22, cursor:"pointer" }}>×</button>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={labelStyle}>NOMBRE</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre de la cuenta" style={fieldStyle} />
        </div>
        <div style={{ marginBottom:20 }}>
          <label style={labelStyle}>TIPO</label>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {typeOrder.map(t => (
              <button key={t} onClick={() => setType(t)}
                style={{ background: type===t ? COLORS.surface2 : "none", border: type===t ? "1px solid "+COLORS.green : "1px solid transparent", borderRadius:10, padding:"11px 14px", display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}>
                <span style={{ fontSize:20 }}>{ACCOUNT_ICONS[t]}</span>
                <span style={{ color:COLORS.textPrimary, fontSize:14 }}>{ACCOUNT_TYPES[t]}</span>
                {type===t && <span style={{ marginLeft:"auto", color:COLORS.green }}>✓</span>}
              </button>
            ))}
          </div>
        </div>
        <button onClick={handleSave} disabled={!name.trim()}
          style={{ width:"100%", background: name.trim() ? COLORS.green : COLORS.border, border:"none", borderRadius:12, padding:"14px 0", color:"white", fontSize:16, fontWeight:700, cursor: name.trim() ? "pointer" : "default" }}>
          {existing ? "Guardar cambios" : "Agregar cuenta"}
        </button>
      </div>
      {confirm && (
        <ConfirmDialog
          message="Guardar los cambios en esta cuenta?"
          onConfirm={() => { onSave({ ...existing, name:name.trim(), type }); onClose(); }}
          onCancel={() => setConfirm(false)}
        />
      )}
    </div>
  );
}

// ACCOUNT DETAIL VIEW
function CuentaDetalle({ acc, movimientos, onClose, onEdit }) {

    .sort((a,b) => new Date(b.date)-new Date(a.date));

  const filtered = allAccMovs.filter(m => {
    const d = new Date(m.date);
    return d.getMonth()===selectedDate.getMonth() && d.getFullYear()===selectedDate.getFullYear();
  });

  const ingresos = filtered.filter(m => m.tipo==="ingreso").reduce((s,m) => s+m.amount, 0);
  const gastos   = filtered.filter(m => m.tipo==="gasto").reduce((s,m) => s+m.amount, 0);
  const balance  = ingresos - gastos;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:250, background:COLORS.bg, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ padding:"16px 20px", display:"flex", alignItems:"center", gap:12, borderBottom:"1px solid "+COLORS.border }}>

        <div style={{ flex:1 }}>
          <div style={{ color:COLORS.textPrimary, fontWeight:700, fontSize:16 }}>{acc.name}</div>
          <div style={{ color:COLORS.textSecondary, fontSize:12 }}>{ACCOUNT_TYPES[acc.type]}</div>
        </div>
        <button onClick={onEdit} style={{ background:COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:8, padding:"6px 14px", color:COLORS.textPrimary, fontSize:13, cursor:"pointer" }}>Editar</button>
      </div>

      {/* Balance */}
      <div style={{ padding:"16px 20px 12px", borderBottom:"1px solid "+COLORS.border }}>
        <div style={{ fontSize:12, color:COLORS.textMuted, marginBottom:4 }}>Saldo actual</div>
        <div style={{ fontSize:32, fontWeight:700, fontFamily:"monospace", color: acc.balance<0 ? COLORS.redSoft : COLORS.green }}>{fmt(acc.balance)}</div>
      </div>

      {/* Month navigator + summary */}
      <div style={{ padding:"12px 16px", borderBottom:"1px solid "+COLORS.border }}>
        <DateNavigator selectedDate={selectedDate} onDateChange={setSelectedDate} />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
          <div style={{ background:COLORS.green, borderRadius:10, padding:"10px 12px" }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Ingresos</div>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(ingresos)}</div>
          </div>
          <div style={{ background:COLORS.red, borderRadius:10, padding:"10px 12px" }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Gastos</div>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(gastos)}</div>
          </div>
          <div style={{ background:"#2a2a2a", borderRadius:10, padding:"10px 12px" }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:2 }}>Balance</div>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"monospace", color: balance<0?COLORS.redSoft:"white" }}>{fmt(balance)}</div>
          </div>
        </div>
      </div>

      {/* Movements */}
      <div style={{ flex:1, overflowY:"auto", padding:"0 16px" }}>
        {filtered.length===0 ? (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 20px", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>💸</div>
            <div style={{ color:COLORS.textSecondary, fontSize:16, fontWeight:500 }}>Sin movimientos</div>
          </div>
        ) : (
          filtered.map(m => {
            const d = new Date(m.date);
            const isGasto = m.tipo==="gasto";
            const isTransferencia = m.tipo==="transferencia";
            const bgColor = isTransferencia ? COLORS.blue : isGasto ? COLORS.red : COLORS.green;
            const amountColor = isTransferencia ? COLORS.blue : isGasto ? COLORS.redSoft : COLORS.green;
            const isIncoming = isTransferencia && m.accountDestId===acc.id;
            return (
              <div key={m.id} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"14px 0", borderBottom:"1px solid "+COLORS.border }}>

                  {isTransferencia ? "⇄" : (m.categoryIcon||"📦")}

                  {isTransferencia ? (
                    <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:3, flexWrap:"wrap" }}>
                      <span style={{ color:COLORS.textPrimary, fontWeight:700, fontSize:14 }}>De</span>

                      <span style={{ color:COLORS.textPrimary, fontWeight:700, fontSize:14 }}>A</span>
                      <span style={{ color:COLORS.textSecondary, fontSize:13 }}>{m.accountDest||"Sin cuenta"}</span>
                    </div>
                  ) : (
                    <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:3 }}>
                      <span style={{ color:COLORS.textPrimary, fontWeight:600, fontSize:14 }}>{m.category}</span>
                      <span style={{ color:COLORS.textSecondary, fontSize:12 }}>{m.account||"Sin cuenta"}</span>
                    </div>
                  )}
                  <div style={{ color:COLORS.textSecondary, fontSize:12 }}>
                    {d.getDate()}/{d.getMonth()+1}/{d.getFullYear()} {m.time||""}
                    {m.description ? " · "+m.description : ""}
                  </div>
                </div>
                <div style={{ color:amountColor, fontFamily:"monospace", fontWeight:700, fontSize:15, flexShrink:0, marginTop:2 }}>
                  {isTransferencia ? (isIncoming ? "+" : "-") : (isGasto ? "-" : "+")}{fmt(m.amount)}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function TabCuentas({ accounts, onAddAccount, onEditAccount, movimientos }) {
  const [selectedAcc, setSelectedAcc] = useState(null);
  const [editingAcc, setEditingAcc] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const netWorth = accounts.reduce((s,a)=>s+a.balance,0);
  const grouped = {};
  accounts.forEach(a => { if(!grouped[a.type]) grouped[a.type]=[]; grouped[a.type].push(a); });
  const typeOrder = ["efectivo","debito","billetera_virtual","credito","inversion"];

  if (selectedAcc) {
    const acc = accounts.find(a=>a.id===selectedAcc.id) || selectedAcc;
    return (
      <>
        <CuentaDetalle
          acc={acc}
          movimientos={movimientos}
          onClose={() => setSelectedAcc(null)}
          onEdit={() => setEditingAcc(acc)}
        />
        {editingAcc && (
          <FormCuenta existing={editingAcc} onClose={() => setEditingAcc(null)} onSave={(updated) => { onEditAccount(updated); setEditingAcc(null); }} />
        )}
      </>
    );
  }

  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ background:COLORS.green, borderRadius:14, padding:"18px 20px", marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginBottom:4 }}>Patrimonio neto</div>
          <div style={{ fontSize:28, fontWeight:700, fontFamily:"monospace", color:"white" }}>{fmt(netWorth)}</div>
        </div>
        <button onClick={() => setShowAdd(true)}
          style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:10, padding:"8px 14px", display:"flex", alignItems:"center", gap:6, cursor:"pointer", color:"white", fontSize:13, fontWeight:600 }}>
          <span style={{ fontSize:18, lineHeight:1 }}>+</span> Agregar cuenta
        </button>
      </div>

      {typeOrder.map(type => {
        const accs = grouped[type];
        if (!accs) return null;
        return (
          <div key={type} style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:COLORS.textMuted, letterSpacing:"0.08em", marginBottom:8, paddingLeft:4 }}>{ACCOUNT_TYPES[type]}</div>
            {accs.map(acc => (
              <div key={acc.id} onClick={() => setSelectedAcc(acc)}
                style={{ background:COLORS.surface, borderRadius:12, padding:"12px 14px", display:"flex", alignItems:"center", gap:12, marginBottom:8, cursor:"pointer" }}>
                <div style={{ width:40, height:40, borderRadius:10, background:COLORS.border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{ACCOUNT_ICONS[acc.type]}</div>
                <div style={{ flex:1 }}>
                  <div style={{ color:COLORS.textPrimary, fontWeight:600, fontSize:15 }}>{acc.name}</div>
                  <div style={{ color:COLORS.textSecondary, fontSize:12, textTransform:"capitalize" }}>{acc.type.replace("_"," ")}</div>
                </div>
                <div style={{ fontFamily:"monospace", fontWeight:700, fontSize:15, color:acc.balance<0?COLORS.redSoft:COLORS.green }}>{fmt(acc.balance)}</div>
              </div>
            ))}
          </div>
        );
      })}

      {showAdd && <FormCuenta onClose={() => setShowAdd(false)} onSave={(acc) => { onAddAccount(acc); setShowAdd(false); }} />}
      {editingAcc && <FormCuenta existing={editingAcc} onClose={() => setEditingAcc(null)} onSave={(updated) => { onEditAccount(updated); setEditingAcc(null); }} />}
    </div>
  );
}

// AJUSTES
function PantallaAjustes({ onClose, movimientos, accounts, onImport }) {
  const [msg, setMsg] = useState("");

  function exportTXT() {
    const lines = movimientos.map(m => [
      m.amount,
      new Date(m.date).toLocaleDateString("es-AR"),
      m.time||"",
      m.account||"",
      m.category||"",
      m.description||"",
      m.tipo,
      m.accountDest||"",
    ].join("-"));
    const blob = new Blob([lines.join("\n")], { type:"text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "finanzapp_movimientos.txt";
    a.click();
  }

  function exportCSV() {
    const header = "monto,fecha,hora,cuenta,categoria,descripcion,tipo,cuenta_destino";
    const lines = movimientos.map(m => [
      m.amount,
      new Date(m.date).toLocaleDateString("es-AR"),
      m.time||"",
      '"'+(m.account||"")+'"',
      '"'+(m.category||"")+'"',
      '"'+(m.description||"")+'"',
      m.tipo,
      '"'+(m.accountDest||"")+'"',
    ].join(","));
    const blob = new Blob([[header,...lines].join("\n")], { type:"text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "finanzapp_movimientos.csv";
    a.click();
  }

  function importFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const isCSV = file.name.endsWith(".csv");
      const lines = text.split("
").filter(l => l.trim());
      const dataLines = isCSV ? lines.slice(1) : lines;
      const newMovs = [];
      const newAccNames = [];
      const newCatNames = [];
      dataLines.forEach(line => {
        const parts = isCSV
          ? line.split(",").map(p => p.replace(/^"|"$/g,"").trim())
          : line.split("-").map(p => p.trim());
        if (parts.length < 6) return;
        const [amount, fecha, hora, cuenta, categoria, descripcion, tipo, cuentaDest] = parts;
        const [d,m,y] = fecha.split("/");
        const dateObj = new Date(y, parseInt(m)-1, parseInt(d));
        if (cuenta && !newAccNames.includes(cuenta)) newAccNames.push(cuenta);
        if (cuentaDest && !newAccNames.includes(cuentaDest)) newAccNames.push(cuentaDest);
        newMovs.push({
          id: Date.now() + Math.random(),
          tipo: tipo||"gasto",
          amount: parseFloat(amount)||0,
          date: dateObj.toISOString(),
          time: hora||"",
          account: cuenta||"Sin cuenta",
          accountDest: cuentaDest||"",
          category: categoria||"Sin categoria",
          categoryIcon: "📦",
          description: descripcion||"",
        });
        if (categoria && !newCatNames.includes(categoria)) newCatNames.push(categoria);
      });

      let updatedAccounts = [...accounts];
      newAccNames.forEach(name => {
        if (!updatedAccounts.find(a => a.name===name)) {
          updatedAccounts.push({ id:Date.now()+Math.random(), name, type:"efectivo", balance:0 });
        }
      });

      const allMovs = [...movimientos, ...newMovs];
      onImport(allMovs, updatedAccounts);
      setMsg("Importados " + newMovs.length + " movimientos correctamente.");
    };
    reader.readAsText(file);
  }

  const sectionStyle = { marginBottom:24 };
  const titleStyle = { fontSize:13, color:COLORS.textMuted, fontWeight:600, letterSpacing:"0.06em", marginBottom:12 };
  const btnStyle = (color) => ({ width:"100%", background:color||COLORS.surface, border:"1px solid "+COLORS.border, borderRadius:12, padding:"14px 16px", color:COLORS.textPrimary, fontSize:14, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:12, marginBottom:8 });

  return (
    <div style={{ position:"fixed", inset:0, zIndex:300, background:COLORS.bg, display:"flex", flexDirection:"column" }}>
      <div style={{ padding:"16px 20px", display:"flex", alignItems:"center", borderBottom:"1px solid "+COLORS.border }}>
        <button onClick={onClose} style={{ background:"none", border:"none", color:COLORS.textSecondary, fontSize:22, cursor:"pointer", marginRight:12 }}>‹</button>
        <span style={{ color:COLORS.textPrimary, fontSize:18, fontWeight:700 }}>Ajustes</span>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"20px 16px" }}>

        <div style={sectionStyle}>
          <div style={titleStyle}>EXPORTAR</div>
          <button onClick={exportTXT} style={btnStyle()}>
            <span style={{ fontSize:22 }}>📄</span>
            <div style={{ textAlign:"left" }}>
              <div>Exportar como Notas (.txt)</div>
              <div style={{ fontSize:12, color:COLORS.textSecondary, fontWeight:400 }}>monto-fecha-hora-cuenta-categoria-descripcion</div>
            </div>
          </button>
          <button onClick={exportCSV} style={btnStyle()}>
            <span style={{ fontSize:22 }}>📊</span>
            <div style={{ textAlign:"left" }}>
              <div>Exportar como Excel (.csv)</div>
              <div style={{ fontSize:12, color:COLORS.textSecondary, fontWeight:400 }}>Abrir con Excel o Google Sheets</div>
            </div>
          </button>
        </div>

        <div style={sectionStyle}>
          <div style={titleStyle}>IMPORTAR</div>
          <button onClick={() => { const i=document.createElement("input");i.type="file";i.accept=".txt,.csv";i.onchange=importFile;i.click(); }} style={btnStyle()}>
            <span style={{ fontSize:22 }}>📥</span>
            <div style={{ textAlign:"left" }}>
              <div>Importar archivo (.txt o .csv)</div>
              <div style={{ fontSize:12, color:COLORS.textSecondary, fontWeight:400 }}>Si la cuenta o categoria no existe, se crea automaticamente</div>
            </div>
          </button>
          {msg && <div style={{ background:COLORS.surface, borderRadius:10, padding:"12px 14px", color:COLORS.green, fontSize:13, marginTop:8 }}>{msg}</div>}
        </div>

      </div>
    </div>
  );
}

// APP
function FinanzApp() {
  const [tab, setTab] = useState("movimientos");
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [showTypeModal, setShowTypeModal] = useState(false);
  const [activeForm, setActiveForm] = useState(null);
  const [movimientos, setMovimientos] = useState(() => loadData("finanzapp_movimientos", []));
  const [accounts, setAccounts] = useState(() => loadData("finanzapp_accounts", DEFAULT_ACCOUNTS));

  useEffect(() => { saveData("finanzapp_movimientos", movimientos); }, [movimientos]);
  useEffect(() => { saveData("finanzapp_accounts", accounts); }, [accounts]);

  function handleSave(mov) {
    if (mov.isEdit) {
      setMovimientos(p => p.map(m => m.id===mov.id ? mov : m));
      setAccounts(prev => prev.map(a => {
        let bal = a.balance;
        if (mov.prevTipo==="transferencia") {
          if (a.id===mov.prevAccountId) bal += mov.prevAmount;
          if (a.id===mov.prevAccountDestId) bal -= mov.prevAmount;
        } else {
          if (a.id===mov.prevAccountId) bal += mov.prevTipo==="gasto" ? mov.prevAmount : -mov.prevAmount;
        }
        if (mov.tipo==="transferencia") {
          if (a.id===mov.accountId) bal -= mov.amount;
          if (a.id===mov.accountDestId) bal += mov.amount;
        } else {
          if (a.id===mov.accountId) bal += mov.tipo==="gasto" ? -mov.amount : mov.amount;
        }
        return {...a, balance:bal};
      }));
    } else {
      setMovimientos(p => [mov, ...p]);
      if (mov.tipo==="transferencia") {
        setAccounts(prev => prev.map(a => {
          if (a.id===mov.accountId) return {...a, balance: a.balance - mov.amount};
          if (a.id===mov.accountDestId) return {...a, balance: a.balance + mov.amount};
          return a;
        }));
      } else if (mov.accountId) {
        setAccounts(prev => prev.map(a => {
          if (a.id!==mov.accountId) return a;
          const delta = mov.tipo==="gasto" ? -mov.amount : mov.amount;
          return {...a, balance: a.balance+delta};
        }));
      }
    }
  }

  function handleDelete(id) {
    const mov = movimientos.find(m => m.id===id);
    if (mov) {
      setAccounts(prev => prev.map(a => {
        if (mov.tipo==="transferencia") {
          if (a.id===mov.accountId) return {...a, balance: a.balance + mov.amount};
          if (a.id===mov.accountDestId) return {...a, balance: a.balance - mov.amount};
        } else {
          if (a.id===mov.accountId) {
            const delta = mov.tipo==="gasto" ? mov.amount : -mov.amount;
            return {...a, balance: a.balance + delta};
          }
        }
        return a;
      }));
    }
    setMovimientos(p => p.filter(m => m.id!==id));
  }

  function handleTypeSelect(tipo) {
    setShowTypeModal(false);
    if (tipo==="gasto"||tipo==="ingreso"||tipo==="transferencia") setActiveForm({ tipo });
  }

  const [showSettings, setShowSettings] = useState(false);

  const TABS = [
    { id:"movimientos", label:"Movimientos", Icon:IconMovimientos },
    { id:"periodicos",  label:"Periodicos",  Icon:IconPeriodicos },
    { id:"analisis",    label:"Analisis",    Icon:IconAnalisis },
    { id:"cuentas",     label:"Cuentas",     Icon:IconCuentas },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#000", display:"flex", justifyContent:"center", fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <div style={{ width:"100%", maxWidth:500, minHeight:"100vh", background:COLORS.bg, display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"16px 20px 12px", display:"flex", alignItems:"center" }}>
          <span style={{ fontSize:22, fontWeight:700, color:COLORS.green, letterSpacing:"-0.5px" }}>Finanz</span>
          <span style={{ fontSize:22, fontWeight:700, color:COLORS.textPrimary, letterSpacing:"-0.5px" }}>App</span>
          <button onClick={() => setShowSettings(true)} style={{ marginLeft:"auto", background:"none", border:"none", cursor:"pointer", color:COLORS.textSecondary, display:"flex", alignItems:"center", padding:4 }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
        <div style={{ flex:1, overflowY:"auto", paddingBottom:80 }}>
          {tab==="movimientos" && <TabMovimientos selectedDate={selectedDate} onDateChange={setSelectedDate} movimientos={movimientos} onDelete={handleDelete} onEdit={handleSave} accounts={accounts} />}
          {tab==="periodicos"  && <TabPeriodicos  selectedDate={selectedDate} onDateChange={setSelectedDate} />}
          {tab==="analisis"    && <TabAnalisis    selectedDate={selectedDate} onDateChange={setSelectedDate} movimientos={movimientos} />}
          {tab==="cuentas"     && <TabCuentas accounts={accounts} movimientos={movimientos} onAddAccount={(acc) => setAccounts(p => [...p, acc])} onEditAccount={(acc) => setAccounts(p => p.map(a => a.id===acc.id ? acc : a))} />}
        </div>
        <button onClick={() => setShowTypeModal(true)}
          style={{ position:"fixed", bottom:72, right:16, width:56, height:56, borderRadius:"50%", background:COLORS.blue, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 4px 16px rgba(55,138,221,0.45)", zIndex:100 }}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div style={{ position:"fixed", bottom:0, width:"100%", maxWidth:500, background:COLORS.bg, borderTop:"1px solid "+COLORS.border, display:"flex", zIndex:99 }}>
          {TABS.map(({ id, label, Icon }) => (
            <button key={id} onClick={() => setTab(id)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", padding:"10px 0 8px", display:"flex", flexDirection:"column", alignItems:"center", position:"relative" }}>
              {tab===id && <div style={{ position:"absolute", top:0, left:"25%", width:"50%", height:2, background:COLORS.green, borderRadius:"0 0 2px 2px" }} />}
              <Icon active={tab===id} />
              <span style={{ fontSize:11, marginTop:3, color:tab===id?COLORS.green:COLORS.textSecondary, fontWeight:tab===id?600:400 }}>{label}</span>
            </button>
          ))}
        </div>
        {showTypeModal && <ModalTipoMovimiento onClose={() => setShowTypeModal(false)} onSelect={handleTypeSelect} />}
        {activeForm && <FormMovimiento tipo={activeForm.tipo||activeForm} existing={activeForm.existing||null} onClose={() => setActiveForm(null)} onSave={handleSave} onDelete={handleDelete} accounts={accounts} />}
        {showSettings && <PantallaAjustes onClose={() => setShowSettings(false)} movimientos={movimientos} accounts={accounts} onImport={(movs, accs) => { setMovimientos(movs); setAccounts(accs); }} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FinanzApp));
  </script>
</body>
